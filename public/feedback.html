<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback — ClassMind AI</title>
  <style>
    .page-header { padding: 28px 32px 0; }
    .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .page-header p { color: var(--muted); font-size: 14px; }
    .page-content { padding: 24px 32px 40px; max-width: 640px; }

    .category-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .cat-btn { padding: 7px 16px; border-radius: 99px; border: 1.5px solid var(--border); background: var(--card2); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--card); }
    .cat-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }

    .char-count { font-size: 11px; color: var(--muted); text-align: right; margin-top: 4px; }
    .char-count.warn { color: var(--warn); }
    .char-count.over { color: var(--danger); }

    .star-row { display: flex; gap: 6px; margin-top: 6px; }
    .star { font-size: 28px; cursor: pointer; opacity: .3; transition: opacity .12s, transform .1s; line-height: 1; user-select: none; }
    .star:hover, .star.active { opacity: 1; transform: scale(1.12); }
    .star-label { font-size: 12px; color: var(--muted); margin-top: 6px; }

    .success-card { text-align: center; padding: 40px 24px; }
    .success-icon { font-size: 52px; margin-bottom: 14px; }
    .success-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--success); }
    .success-msg { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }

    @media (max-width: 768px) { .page-header { padding: 20px 16px 0; } .page-content { padding: 16px 16px 40px; } }
  </style>
</head>
<body>
<div class="page-header">
  <h1>Share Your Feedback</h1>
  <p>Help us make ClassMind AI better — every submission is read by the team.</p>
</div>
<div class="page-content">
  <div class="card" id="feedbackCard">
    <div class="card-title">Submit Feedback</div>

    <div id="errMsg" class="alert-error" style="display:none"></div>

    <div id="feedbackForm">
      <div class="form-group">
        <label>Category <span style="color:var(--danger)">*</span></label>
        <div class="category-grid">
          <button type="button" class="cat-btn" data-cat="Bug Report" onclick="selectCat(this)">🐛 Bug Report</button>
          <button type="button" class="cat-btn" data-cat="Feature Request" onclick="selectCat(this)">✨ Feature Request</button>
          <button type="button" class="cat-btn" data-cat="General Feedback" onclick="selectCat(this)">💬 General Feedback</button>
          <button type="button" class="cat-btn" data-cat="Course Issue" onclick="selectCat(this)">📚 Course Issue</button>
          <button type="button" class="cat-btn" data-cat="Study Tip Suggestion" onclick="selectCat(this)">💡 Study Tip Suggestion</button>
        </div>
      </div>

      <div class="form-group">
        <label>Message <span style="color:var(--danger)">*</span></label>
        <textarea id="msgInput" rows="5" placeholder="Describe your idea, issue, or suggestion in detail…" style="resize:vertical" maxlength="2000" oninput="updateCharCount()"></textarea>
        <div class="char-count" id="charCount">0 / 2000</div>
      </div>

      <div class="form-group">
        <label>Rating <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <div class="star-row" id="starRow">
          <span class="star" data-v="1" onclick="rateStar(1)" title="Poor">⭐</span>
          <span class="star" data-v="2" onclick="rateStar(2)" title="Fair">⭐</span>
          <span class="star" data-v="3" onclick="rateStar(3)" title="Good">⭐</span>
          <span class="star" data-v="4" onclick="rateStar(4)" title="Great">⭐</span>
          <span class="star" data-v="5" onclick="rateStar(5)" title="Excellent">⭐</span>
        </div>
        <div class="star-label" id="starLabel">Click to rate</div>
      </div>

      <button class="btn-primary" id="submitBtn" onclick="submitFeedback()">Submit Feedback</button>
    </div>

    <div id="successCard" class="success-card" style="display:none">
      <div class="success-icon">🙏</div>
      <div class="success-title">Thank you!</div>
      <div class="success-msg">Your feedback helps us improve ClassMind AI. We read every submission and use it to make the app better for every student.</div>
      <button class="btn-primary" onclick="resetForm()">Submit Another</button>
    </div>
  </div>
</div>
<script src="/shared.js"></script>
<script>
if (!Auth.requireAuth()) throw new Error('redirect');
renderNav('Feedback');

const STAR_LABELS = ['', 'Poor — needs a lot of work', 'Fair — some issues', 'Good — mostly satisfied', 'Great — really enjoying it!', 'Excellent — love it!'];
let selectedCat = '';
let selectedRating = null;

function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCat = btn.dataset.cat;
}

function rateStar(v) {
  selectedRating = v;
  document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < v));
  document.getElementById('starLabel').textContent = STAR_LABELS[v] || '';
}

function updateCharCount() {
  const n = document.getElementById('msgInput').value.length;
  const el = document.getElementById('charCount');
  el.textContent = n + ' / 2000';
  el.className = 'char-count' + (n >= 2000 ? ' over' : n >= 1800 ? ' warn' : '');
}

async function submitFeedback() {
  const msg = document.getElementById('msgInput').value.trim();
  const errEl = document.getElementById('errMsg');
  errEl.style.display = 'none';

  if (!selectedCat) { errEl.textContent = 'Please select a category.'; errEl.style.display = 'block'; return; }
  if (!msg || msg.length < 10) { errEl.textContent = 'Message must be at least 10 characters.'; errEl.style.display = 'block'; return; }
  if (msg.length > 2000) { errEl.textContent = 'Message must be under 2000 characters.'; errEl.style.display = 'block'; return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Sending…';

  const res = await Auth.fetchWithAuth('/api/feedback', { method: 'POST', body: JSON.stringify({ category: selectedCat, message: msg, rating: selectedRating }) });

  btn.disabled = false; btn.textContent = 'Submit Feedback';

  if (!res || !res.ok) {
    const e = await (res ? res.json().catch(() => ({})) : Promise.resolve({}));
    errEl.textContent = e.error || 'Something went wrong. Please try again.';
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('feedbackForm').style.display = 'none';
  document.getElementById('successCard').style.display = 'block';
}

function resetForm() {
  selectedCat = '';
  selectedRating = null;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
  document.getElementById('starLabel').textContent = 'Click to rate';
  document.getElementById('msgInput').value = '';
  document.getElementById('charCount').textContent = '0 / 2000';
  document.getElementById('charCount').className = 'char-count';
  document.getElementById('errMsg').style.display = 'none';
  document.getElementById('feedbackForm').style.display = 'block';
  document.getElementById('successCard').style.display = 'none';
}
</script>
</body>
</html>
