<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes — ClassMind AI</title>
  <style>
    .page-header { padding: 28px 32px 0; }
    .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .page-header p { color: var(--muted); font-size: 14px; }
    .page-content { padding: 24px 32px 40px; }

    .notes-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-box { position: relative; flex: 1; max-width: 360px; }
    .search-box input { padding-left: 36px; }
    .search-box::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; }

    .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .note-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 10px; cursor: pointer; transition: border-color .15s; }
    .note-card:hover { border-color: var(--accent); }
    .note-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .note-name-input { font-size: 15px; font-weight: 700; color: var(--text); background: var(--bg2); border: 1px solid var(--accent); border-radius: 6px; padding: 4px 8px; width: 100%; display: none; }
    .note-date { font-size: 12px; color: var(--muted); }
    .note-overview { font-size: 13px; color: var(--text2); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
    .note-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .note-actions { display: flex; gap: 6px; }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-state div { font-size: 48px; margin-bottom: 16px; }
    .empty-state strong { display: block; font-size: 16px; color: var(--text2); margin-bottom: 8px; }

    .detail-modal .modal { max-width: 760px; width: 95vw; max-height: 85vh; overflow-y: auto; }
    .detail-modal .modal-title { font-size: 20px; }
    .detail-section { margin-bottom: 20px; }
    .detail-section h3 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 10px; }
    .overview-text { font-size: 14px; color: var(--text2); line-height: 1.7; }
    .assignment-row { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
    .assignment-row .title { font-size: 14px; font-weight: 600; }
    .assignment-row .meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .timetable-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .timetable-table th { text-align: left; padding: 6px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
    .timetable-table td { padding: 7px 10px; border-bottom: 1px solid rgba(51,65,85,.3); }
    .topics-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
    .topics-item summary { font-size: 14px; font-weight: 600; cursor: pointer; }
    .topics-item ul { margin-top: 8px; padding-left: 16px; font-size: 13px; color: var(--text2); }
    .lecturer-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; font-size: 13px; }
    .lecturer-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .tip-box { background: var(--accent-light); border: 1px solid rgba(59,130,246,.25); border-radius: 8px; padding: 14px 16px; font-size: 14px; color: var(--text2); line-height: 1.7; }

    @media (max-width: 768px) { .page-content { padding: 16px 16px 40px; } }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Notes</h1>
  <p>Your saved AI analyses and study notes.</p>
</div>
<div class="page-content">

  <div class="notes-toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search notes…" oninput="filterNotes()">
    </div>
    <div id="noteCount" style="font-size:13px;color:var(--muted)"></div>
  </div>

  <div id="notesGrid" class="notes-grid">
    <div style="grid-column:1/-1;text-align:center;padding:60px">
      <div class="spinner" style="margin:0 auto 16px"></div>
      Loading notes…
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-backdrop detail-modal" id="detailModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalContent"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script src="/shared.js"></script>
<script>
if (!Auth.requireAuth()) throw new Error('redirect');
renderNav('Notes');

let allNotes = [];

async function loadNotes() {
  const res = await Auth.fetchWithAuth('/api/analyses');
  if (!res || !res.ok) { showToast('Failed to load notes.', 'error'); return; }
  allNotes = await res.json();
  renderNotes(allNotes);
}

function filterNotes() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { renderNotes(allNotes); return; }
  renderNotes(allNotes.filter(n => n.name.toLowerCase().includes(q) || (n.overview || '').toLowerCase().includes(q)));
}

function renderNotes(notes) {
  const grid = document.getElementById('notesGrid');
  document.getElementById('noteCount').textContent = notes.length + ' note' + (notes.length !== 1 ? 's' : '');
  if (!notes.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div>📝</div>
      <strong>No notes yet</strong>
      Go to Study Hub to analyse your first document and save it as a note.
    </div>`;
    return;
  }
  grid.innerHTML = notes.map(n => `
    <div class="note-card" onclick="openNote(${n.id})">
      <div>
        <div class="note-name" id="noteName_${n.id}">${escHtmlClient(n.name)}</div>
        <input class="note-name-input" id="noteNameInput_${n.id}" value="${escHtmlClient(n.name)}"
               onclick="event.stopPropagation()" onblur="saveNoteName(event, ${n.id})"
               onkeydown="handleNameKey(event, ${n.id})">
      </div>
      <div class="note-date">${formatDate(n.created_at)}</div>
      ${n.overview ? `<div class="note-overview">${escHtmlClient(n.overview)}</div>` : ''}
      <div class="note-footer">
        ${n.assignment_count ? `<span class="badge badge-blue">${n.assignment_count} task${n.assignment_count !== 1 ? 's' : ''}</span>` : '<span></span>'}
        <div class="note-actions" onclick="event.stopPropagation()">
          <button class="btn-sm btn-secondary" onclick="startRename(${n.id})">Rename</button>
          <button class="btn-sm btn-danger" onclick="deleteNote(${n.id})">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

function startRename(id) {
  const nameEl = document.getElementById('noteName_' + id);
  const inputEl = document.getElementById('noteNameInput_' + id);
  nameEl.style.display = 'none';
  inputEl.style.display = 'block';
  inputEl.focus();
  inputEl.select();
}

function handleNameKey(e, id) {
  if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
  if (e.key === 'Escape') {
    const n = allNotes.find(x => x.id === id);
    if (n) e.target.value = n.name;
    e.target.blur();
  }
}

async function saveNoteName(e, id) {
  const newName = e.target.value.trim();
  const n = allNotes.find(x => x.id === id);
  if (!n || !newName || newName === n.name) {
    if (newName) {
      document.getElementById('noteName_' + id).style.display = 'block';
      document.getElementById('noteNameInput_' + id).style.display = 'none';
    }
    return;
  }
  const res = await Auth.fetchWithAuth('/api/analyses/' + id, {
    method: 'PUT',
    body: JSON.stringify({ name: newName })
  });
  if (res && res.ok) {
    n.name = newName;
    document.getElementById('noteName_' + id).textContent = newName;
    document.getElementById('noteName_' + id).style.display = 'block';
    document.getElementById('noteNameInput_' + id).style.display = 'none';
    showToast('Note renamed.', 'success');
  } else {
    showToast('Rename failed.', 'error');
    document.getElementById('noteName_' + id).style.display = 'block';
    document.getElementById('noteNameInput_' + id).style.display = 'none';
  }
}

async function deleteNote(id) {
  if (!confirm('Delete this note? This cannot be undone.')) return;
  const res = await Auth.fetchWithAuth('/api/analyses/' + id, { method: 'DELETE' });
  if (res && res.ok) {
    allNotes = allNotes.filter(n => n.id !== id);
    filterNotes();
    showToast('Note deleted.', 'success');
  } else {
    showToast('Failed to delete note.', 'error');
  }
}

async function openNote(id) {
  const res = await Auth.fetchWithAuth('/api/analyses/' + id);
  if (!res || !res.ok) { showToast('Could not load note.', 'error'); return; }
  const data = await res.json();
  const result = data.result || {};
  document.getElementById('modalTitle').textContent = data.name;
  document.getElementById('modalContent').innerHTML = buildNoteDetail(result);
  document.getElementById('detailModal').classList.add('open');
}

function buildNoteDetail(r) {
  const parts = [];

  if (r.overview) {
    parts.push(`<div class="detail-section">
      <h3>Overview</h3>
      <div class="overview-text">${escHtmlClient(r.overview)}</div>
    </div>`);
  }

  if (r.assignments && r.assignments.length) {
    parts.push(`<div class="detail-section">
      <h3>Assignments &amp; Tasks (${r.assignments.length})</h3>
      ${r.assignments.map(a => `
        <div class="assignment-row">
          <div class="title">${escHtmlClient(a.title || '')}</div>
          <div class="meta">
            ${a.subject ? escHtmlClient(a.subject) + ' · ' : ''}
            Deadline: ${escHtmlClient(a.deadline || '—')} ·
            Priority: <span class="badge ${a.priority === 'HIGH' ? 'badge-red' : a.priority === 'MEDIUM' ? 'badge-amber' : 'badge-blue'}">${a.priority || 'MEDIUM'}</span>
          </div>
          ${a.details ? `<div style="font-size:12px;color:var(--muted);margin-top:4px">${escHtmlClient(a.details)}</div>` : ''}
        </div>
      `).join('')}
    </div>`);
  }

  if (r.timetable && r.timetable.length) {
    parts.push(`<div class="detail-section">
      <h3>Timetable (${r.timetable.length} entries)</h3>
      <table class="timetable-table">
        <thead><tr><th>Day</th><th>Time</th><th>Subject</th><th>Type</th><th>Venue</th></tr></thead>
        <tbody>${r.timetable.map(t => `
          <tr>
            <td>${escHtmlClient(t.day || '')}</td>
            <td>${escHtmlClient(t.time || '')}</td>
            <td>${escHtmlClient(t.subject || '')} ${t.course_code ? '<small>(' + escHtmlClient(t.course_code) + ')</small>' : ''}</td>
            <td>${escHtmlClient(t.type || '')}</td>
            <td>${escHtmlClient(t.venue || '')}</td>
          </tr>
        `).join('')}</tbody>
      </table>
    </div>`);
  }

  if (r.topics && Object.keys(r.topics).length) {
    parts.push(`<div class="detail-section">
      <h3>Topics</h3>
      ${Object.entries(r.topics).map(([subj, data]) => `
        <details class="topics-item">
          <summary>${escHtmlClient(subj)}</summary>
          ${data.summary ? `<p style="font-size:13px;color:var(--text2);margin:8px 0 4px">${escHtmlClient(data.summary)}</p>` : ''}
          ${data.key_points && data.key_points.length ? `<ul>${data.key_points.map(p => `<li>${escHtmlClient(p)}</li>`).join('')}</ul>` : ''}
        </details>
      `).join('')}
    </div>`);
  }

  if (r.lecturers && r.lecturers.length) {
    parts.push(`<div class="detail-section">
      <h3>Lecturers</h3>
      ${r.lecturers.map(l => `
        <div class="lecturer-card">
          <div class="lecturer-name">${escHtmlClient((l.title ? l.title + ' ' : '') + (l.name || ''))}</div>
          ${l.course ? `<div style="color:var(--muted)">${escHtmlClient(l.course)} ${l.course_code ? '(' + escHtmlClient(l.course_code) + ')' : ''}</div>` : ''}
          ${l.email ? `<div>Email: ${escHtmlClient(l.email)}</div>` : ''}
          ${l.phone ? `<div>Phone: ${escHtmlClient(l.phone)}</div>` : ''}
          ${l.office ? `<div>Office: ${escHtmlClient(l.office)}</div>` : ''}
        </div>
      `).join('')}
    </div>`);
  }

  if (r.tip) {
    parts.push(`<div class="detail-section">
      <h3>Study Tip</h3>
      <div class="tip-box">💡 ${escHtmlClient(r.tip)}</div>
    </div>`);
  }

  return parts.join('') || '<div style="color:var(--muted);text-align:center;padding:30px">No structured data in this note.</div>';
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

loadNotes();
</script>
</body>
</html>
