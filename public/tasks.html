<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tasks — ClassMind AI</title>
  <style>
    .page-header { padding: 28px 32px 0; }
    .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .page-header p { color: var(--muted); font-size: 14px; }
    .page-content { padding: 24px 32px 40px; }

    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill { padding: 6px 16px; border-radius: 99px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: var(--card2); color: var(--muted); cursor: pointer; transition: all .15s; }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: start; }

    .k-col { background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; min-height: 240px; }
    .k-col-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; }
    .k-col-todo .k-col-head { background: rgba(59,130,246,.08); color: var(--accent); }
    .k-col-progress .k-col-head { background: rgba(245,158,11,.08); color: var(--warn); }
    .k-col-done .k-col-head { background: rgba(34,197,94,.08); color: var(--success); }

    .k-count { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 22px; border-radius: 99px; font-size: 11px; font-weight: 700; padding: 0 6px; }
    .k-col-todo .k-count { background: rgba(59,130,246,.15); color: var(--accent); }
    .k-col-progress .k-count { background: rgba(245,158,11,.15); color: var(--warn); }
    .k-col-done .k-count { background: rgba(34,197,94,.15); color: var(--success); }

    .k-col-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

    .task-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; transition: box-shadow .18s, transform .12s; }
    .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.3); transform: translateY(-1px); }
    .task-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .task-subject { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .task-title-text { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
    .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .task-deadline { font-size: 11px; font-weight: 600; color: var(--muted); }
    .task-deadline.urgent { color: var(--danger); }
    .task-deadline.soon { color: var(--warn); }
    .task-deadline.ok { color: var(--success); }
    .task-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .move-btn { padding: 4px 10px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--card2); color: var(--text2); font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .move-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--card); }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 15px; padding: 2px 6px; border-radius: 6px; transition: all .15s; }
    .icon-btn:hover { color: var(--text); background: var(--card2); }
    .icon-btn.danger:hover { color: var(--danger); background: rgba(239,68,68,.1); }
    .k-empty { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 13px; }
    .k-empty-icon { font-size: 26px; margin-bottom: 8px; }

    .spinner-wrap { text-align: center; padding: 60px 20px; }
    .spinner-wrap .spinner { margin: 0 auto 12px; }

    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 2px; }
    .close-btn:hover { color: var(--danger); }

    @media (max-width: 900px) { .kanban { grid-template-columns: 1fr; } }
    @media (max-width: 768px) { .page-header { padding: 20px 16px 0; } .page-content { padding: 16px 16px 40px; } }
  </style>
</head>
<body>
<div class="page-header">
  <h1>Task Board</h1>
  <p>Track your assignments and tasks across all courses</p>
</div>
<div class="page-content">
  <div class="topbar">
    <div class="filter-pills" id="filterPills">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="high">High Priority</button>
      <button class="pill" data-filter="today">Due Today</button>
      <button class="pill" data-filter="week">Due This Week</button>
    </div>
    <button class="btn-primary" onclick="openAddModal()">+ Add Task</button>
  </div>

  <div id="loadingWrap" class="spinner-wrap">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-size:14px">Loading tasks…</p>
  </div>

  <div class="kanban" id="kanban" style="display:none">
    <div class="k-col k-col-todo">
      <div class="k-col-head"><span>To Do</span><span class="k-count" id="cnt-todo">0</span></div>
      <div class="k-col-body" id="col-todo"></div>
    </div>
    <div class="k-col k-col-progress">
      <div class="k-col-head"><span>In Progress</span><span class="k-count" id="cnt-in_progress">0</span></div>
      <div class="k-col-body" id="col-in_progress"></div>
    </div>
    <div class="k-col k-col-done">
      <div class="k-col-head"><span>Done</span><span class="k-count" id="cnt-done">0</span></div>
      <div class="k-col-body" id="col-done"></div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Task</div>
      <button class="close-btn" onclick="closeModal('addModal')">&#xD7;</button>
    </div>
    <div class="form-group">
      <label>Title <span style="color:var(--danger)">*</span></label>
      <input type="text" id="a-title" placeholder="e.g. Complete assignment 2" />
    </div>
    <div class="form-group">
      <label>Subject</label>
      <input type="text" id="a-subject" placeholder="e.g. MTH201" />
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="a-priority">
        <option value="MEDIUM">Medium</option>
        <option value="HIGH">High</option>
        <option value="LOW">Low</option>
      </select>
    </div>
    <div class="form-group">
      <label>Deadline</label>
      <input type="date" id="a-deadline" />
    </div>
    <div class="form-group">
      <label>Details</label>
      <textarea id="a-details" rows="3" placeholder="Any extra notes…" style="resize:vertical"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn-primary" id="addBtn" onclick="submitAdd()">Add Task</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Task</div>
      <button class="close-btn" onclick="closeModal('editModal')">&#xD7;</button>
    </div>
    <div class="form-group">
      <label>Title <span style="color:var(--danger)">*</span></label>
      <input type="text" id="e-title" />
    </div>
    <div class="form-group">
      <label>Subject</label>
      <input type="text" id="e-subject" />
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="e-priority">
        <option value="MEDIUM">Medium</option>
        <option value="HIGH">High</option>
        <option value="LOW">Low</option>
      </select>
    </div>
    <div class="form-group">
      <label>Deadline</label>
      <input type="date" id="e-deadline" />
    </div>
    <div class="form-group">
      <label>Details</label>
      <textarea id="e-details" rows="3" style="resize:vertical"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn-primary" id="editBtn" onclick="submitEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="/shared.js"></script>
<script>
if (!Auth.requireAuth()) throw new Error('redirect');
renderNav('Tasks');

const STATUSES = ['todo', 'in_progress', 'done'];
const STATUS_LABEL = { todo: 'To Do', in_progress: 'In Progress', done: 'Done' };
let allTasks = [];
let activeFilter = 'all';
let editingId = null;

function esc(s) { return escHtmlClient(s); }

function deadlineInfo(str) {
  if (!str) return { text: 'No deadline', cls: '' };
  const d = new Date(str + 'T23:59:00');
  if (isNaN(d)) return { text: str, cls: '' };
  const diff = d - Date.now();
  if (diff < 0) return { text: 'Overdue', cls: 'urgent' };
  const days = Math.floor(diff / 86400000);
  const hrs = Math.floor((diff % 86400000) / 3600000);
  if (days === 0 && hrs < 6) return { text: hrs > 0 ? hrs + 'h left' : 'Due today', cls: 'urgent' };
  if (days <= 1) return { text: '1d left', cls: 'urgent' };
  if (days <= 3) return { text: days + 'd left', cls: 'soon' };
  return { text: days + 'd left · ' + str, cls: 'ok' };
}

function isToday(str) {
  if (!str) return false;
  const d = new Date(str);
  const n = new Date();
  return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
}

function isThisWeek(str) {
  if (!str) return false;
  const d = new Date(str);
  const now = Date.now();
  return d >= now && (d - now) <= 7 * 86400000;
}

function applyFilter(tasks) {
  if (activeFilter === 'high') return tasks.filter(t => t.priority === 'HIGH');
  if (activeFilter === 'today') return tasks.filter(t => isToday(t.deadline));
  if (activeFilter === 'week') return tasks.filter(t => isThisWeek(t.deadline));
  return tasks;
}

function renderBoard() {
  const filtered = applyFilter(allTasks);
  document.getElementById('kanban').style.display = 'grid';
  STATUSES.forEach(status => {
    const col = document.getElementById('col-' + status);
    const cnt = document.getElementById('cnt-' + status);
    const colTasks = filtered.filter(t => t.status === status);
    cnt.textContent = colTasks.length;
    if (!colTasks.length) {
      const icons = { todo: '📋', in_progress: '⏳', done: '✅' };
      col.innerHTML = '<div class="k-empty"><div class="k-empty-icon">' + icons[status] + '</div>No tasks here yet</div>';
      return;
    }
    col.innerHTML = colTasks.map(t => buildCard(t)).join('');
  });
}

function buildCard(t) {
  const id = t.id;
  const si = STATUSES.indexOf(t.status);
  const dl = deadlineInfo(t.deadline);
  const priCls = t.priority === 'HIGH' ? 'badge-red' : t.priority === 'LOW' ? 'badge-blue' : 'badge-amber';
  const canBack = si > 0;
  const canFwd = si < STATUSES.length - 1;
  const backLabel = si === 1 ? '← To Do' : si === 2 ? '← In Progress' : '';
  const fwdLabel = si === 0 ? 'In Progress →' : si === 1 ? 'Done →' : '';
  return '<div class="task-card" id="tc-' + id + '">' +
    '<div class="task-card-top">' +
      '<div class="task-subject">' + esc(t.subject || '') + '</div>' +
      '<div style="display:flex;gap:2px">' +
        '<button class="icon-btn" title="Edit" onclick="openEdit(' + id + ')">✏</button>' +
        '<button class="icon-btn danger" title="Delete" onclick="deleteTask(' + id + ')">🗑</button>' +
      '</div>' +
    '</div>' +
    '<div class="task-title-text">' + esc(t.title) + '</div>' +
    '<div class="task-meta">' +
      '<span class="badge ' + priCls + '">' + esc(t.priority || 'MEDIUM') + '</span>' +
      (t.deadline ? '<span class="task-deadline ' + dl.cls + '">⏱ ' + esc(dl.text) + '</span>' : '') +
    '</div>' +
    '<div class="task-actions">' +
      (canBack ? '<button class="move-btn" onclick="moveTask(' + id + ',-1)">' + esc(backLabel) + '</button>' : '') +
      (canFwd ? '<button class="move-btn" onclick="moveTask(' + id + ',1)">' + esc(fwdLabel) + '</button>' : '') +
    '</div>' +
  '</div>';
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.filter === f));
  renderBoard();
}

document.querySelectorAll('.pill').forEach(p => p.addEventListener('click', () => setFilter(p.dataset.filter)));

async function loadTasks() {
  document.getElementById('loadingWrap').style.display = 'block';
  document.getElementById('kanban').style.display = 'none';
  const res = await Auth.fetchWithAuth('/api/tasks');
  document.getElementById('loadingWrap').style.display = 'none';
  if (!res || !res.ok) { showToast('Could not load tasks', 'error'); renderBoard(); return; }
  allTasks = await res.json();
  if (!Array.isArray(allTasks)) allTasks = [];
  renderBoard();
}

async function moveTask(id, dir) {
  const task = allTasks.find(t => t.id === id);
  if (!task) return;
  const si = STATUSES.indexOf(task.status);
  const newStatus = STATUSES[si + dir];
  if (!newStatus) return;
  const prev = task.status;
  task.status = newStatus;
  renderBoard();
  const res = await Auth.fetchWithAuth('/api/tasks/' + id, { method: 'PUT', body: JSON.stringify({ status: newStatus }) });
  if (!res || !res.ok) { task.status = prev; renderBoard(); showToast('Could not update task', 'error'); return; }
  const updated = await res.json();
  const idx = allTasks.findIndex(t => t.id === id);
  if (idx !== -1) allTasks[idx] = Object.assign({}, allTasks[idx], updated);
  showToast('Moved to ' + STATUS_LABEL[newStatus], 'success');
  renderBoard();
}

async function deleteTask(id) {
  if (!confirm('Delete this task? This cannot be undone.')) return;
  const prev = allTasks.slice();
  allTasks = allTasks.filter(t => t.id !== id);
  renderBoard();
  const res = await Auth.fetchWithAuth('/api/tasks/' + id, { method: 'DELETE' });
  if (!res || !res.ok) { allTasks = prev; renderBoard(); showToast('Could not delete task', 'error'); return; }
  showToast('Task deleted', 'success');
}

function openAddModal() {
  document.getElementById('a-title').value = '';
  document.getElementById('a-subject').value = '';
  document.getElementById('a-priority').value = 'MEDIUM';
  document.getElementById('a-deadline').value = '';
  document.getElementById('a-details').value = '';
  document.getElementById('addModal').classList.add('open');
  document.getElementById('a-title').focus();
}

async function submitAdd() {
  const title = document.getElementById('a-title').value.trim();
  if (!title) { showToast('Title is required', 'error'); document.getElementById('a-title').focus(); return; }
  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = 'Adding…';
  const body = { title, subject: document.getElementById('a-subject').value.trim(), priority: document.getElementById('a-priority').value, deadline: document.getElementById('a-deadline').value, details: document.getElementById('a-details').value.trim() };
  const res = await Auth.fetchWithAuth('/api/tasks', { method: 'POST', body: JSON.stringify(body) });
  btn.disabled = false; btn.textContent = 'Add Task';
  if (!res || !res.ok) { const e = res ? await res.json().catch(() => ({})) : {}; showToast(e.error || 'Could not add task', 'error'); return; }
  const task = await res.json();
  task.status = task.status || 'todo';
  allTasks.unshift(task);
  renderBoard();
  closeModal('addModal');
  showToast('Task added!', 'success');
}

function openEdit(id) {
  const t = allTasks.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('e-title').value = t.title || '';
  document.getElementById('e-subject').value = t.subject || '';
  document.getElementById('e-priority').value = t.priority || 'MEDIUM';
  document.getElementById('e-deadline').value = t.deadline || '';
  document.getElementById('e-details').value = t.details || '';
  document.getElementById('editModal').classList.add('open');
  document.getElementById('e-title').focus();
}

async function submitEdit() {
  const title = document.getElementById('e-title').value.trim();
  if (!title) { showToast('Title is required', 'error'); return; }
  const btn = document.getElementById('editBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const task = allTasks.find(t => t.id === editingId);
  const body = { title, subject: document.getElementById('e-subject').value.trim(), priority: document.getElementById('e-priority').value, deadline: document.getElementById('e-deadline').value, details: document.getElementById('e-details').value.trim(), status: task ? task.status : 'todo' };
  const res = await Auth.fetchWithAuth('/api/tasks/' + editingId, { method: 'PUT', body: JSON.stringify(body) });
  btn.disabled = false; btn.textContent = 'Save Changes';
  if (!res || !res.ok) { const e = res ? await res.json().catch(() => ({})) : {}; showToast(e.error || 'Could not save', 'error'); return; }
  const updated = await res.json();
  const idx = allTasks.findIndex(t => t.id === editingId);
  if (idx !== -1) allTasks[idx] = Object.assign({}, allTasks[idx], updated);
  renderBoard();
  closeModal('editModal');
  showToast('Task saved', 'success');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.getElementById('addModal').addEventListener('click', function(e) { if (e.target === this) closeModal('addModal'); });
document.getElementById('editModal').addEventListener('click', function(e) { if (e.target === this) closeModal('editModal'); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeModal('addModal'); closeModal('editModal'); } });

loadTasks();
</script>
</body>
</html>
