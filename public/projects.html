<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projects — ClassMind AI</title>
  <style>
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .project-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: border-color .15s; position: relative; }
    .project-card:hover { border-color: var(--accent); }
    .project-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .project-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .project-status { position: absolute; top: 14px; right: 14px; }
    .project-card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .editor-layout { display: flex; gap: 20px; height: calc(100vh - 120px); }
    .editor-left { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .editor-right { flex: 1; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
    .section-nav-item { padding: 11px 16px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-left: 3px solid transparent; transition: all .12s; }
    .section-nav-item:hover { background: var(--card2); color: var(--text); }
    .section-nav-item.active { background: var(--accent-light); color: var(--accent); border-left-color: var(--accent); font-weight: 700; }
    .section-nav-item.done { color: var(--success); }
    .editor-top { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .editor-top h2 { font-size: 18px; flex: 1; }
    .section-editor { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .section-content-area { flex: 1; min-height: 300px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-size: 14px; color: var(--text); line-height: 1.7; white-space: pre-wrap; overflow-y: auto; font-family: 'Inter', sans-serif; }
    .section-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .research-panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .research-result { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 14px; max-height: 300px; overflow-y: auto; font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
    .source-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .source-item { font-size: 12px; color: var(--muted); }
    .source-item a { color: var(--accent); }
    @media (max-width: 768px) { .editor-layout { flex-direction: column; height: auto; } .editor-left { width: 100%; } }
  </style>
</head>
<body>

<!-- Projects List View -->
<div id="listView">
  <div class="page-header">
    <h1>Projects</h1>
    <p>Build your academic projects with AI assistance.</p>
  </div>
  <div class="page-content">
    <div style="display:flex;justify-content:flex-end;margin-bottom:18px">
      <button class="btn-primary" onclick="showCreateModal()">+ New Project</button>
    </div>
    <div id="projectsGrid" class="projects-grid">
      <div style="color:var(--muted);grid-column:1/-1;text-align:center;padding:60px">
        <div class="spinner" style="margin:0 auto 16px"></div>Loading projects…
      </div>
    </div>
  </div>
</div>

<!-- Editor View -->
<div id="editorView" style="display:none">
  <div class="page-header" style="display:flex;align-items:center;gap:14px">
    <button class="btn-secondary btn-sm" onclick="backToList()">← Back</button>
    <div>
      <h1 id="editorTitle">Project</h1>
      <p id="editorSubtitle" style="color:var(--muted);font-size:13px"></p>
    </div>
    <div style="margin-left:auto;display:flex;gap:10px">
      <button class="btn-secondary btn-sm" onclick="showResearch()">🔍 Research</button>
      <button class="btn-secondary btn-sm" onclick="showStyleUpload()">📄 Style Sample</button>
    </div>
  </div>
  <div class="page-content">
    <div class="editor-layout">
      <div class="editor-left">
        <div style="padding:12px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border)">Sections</div>
        <div id="sectionNav"></div>
      </div>
      <div class="editor-right">
        <div id="researchPanelEl" class="research-panel" style="display:none">
          <div class="card-title">AI Research</div>
          <div style="display:flex;gap:10px">
            <input id="researchQuery" placeholder="Search topic (e.g. Impact of fintech on Nigerian banking)" style="flex:1">
            <button class="btn-primary" onclick="doResearch()" id="researchBtn">Search</button>
          </div>
          <div id="researchResult" class="research-result" style="display:none"></div>
          <div id="sourceList" class="source-list"></div>
        </div>
        <div id="sectionEditor" class="section-editor">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
            <h2 id="sectionTitle" style="font-size:16px;flex:1"></h2>
            <button class="btn-secondary btn-sm" onclick="generateSection()" id="generateBtn">✦ Generate with AI</button>
          </div>
          <div style="margin-bottom:10px">
            <input id="extraInstructions" placeholder="Extra instructions for AI (optional)…" style="font-size:12px">
          </div>
          <div class="section-content-area" id="sectionContent" contenteditable="true" spellcheck="true"></div>
          <div class="section-actions">
            <button class="btn-primary btn-sm" onclick="saveSectionContent()">Save</button>
            <button class="btn-secondary btn-sm" onclick="clearSectionContent()">Clear</button>
          </div>
        </div>
        <div id="researchNotesArea" class="card" style="display:none">
          <div class="card-title">Research Notes</div>
          <div id="researchNotesContent" style="font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto;color:var(--text2)"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create Project Modal -->
<div class="modal-backdrop" id="createModal">
  <div class="modal">
    <div class="modal-title">New Project</div>
    <div class="form-group">
      <label>Title *</label>
      <input id="newTitle" placeholder="e.g. Impact of Fintech on Nigerian Banking">
    </div>
    <div class="form-group">
      <label>Subject / Course</label>
      <input id="newSubject" placeholder="e.g. BFN401">
    </div>
    <div class="form-group">
      <label>Project Type</label>
      <select id="newType">
        <option value="research">Research Project</option>
        <option value="seminar">Seminar Paper</option>
        <option value="dissertation">Dissertation</option>
        <option value="report">Lab/Technical Report</option>
        <option value="essay">Essay</option>
      </select>
    </div>
    <div class="form-group">
      <label>Brief Description</label>
      <textarea id="newDesc" rows="2" placeholder="What is this project about?"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('createModal')">Cancel</button>
      <button class="btn-primary" onclick="createProject()" id="createBtn">Create Project</button>
    </div>
  </div>
</div>

<!-- Style Upload Modal -->
<div class="modal-backdrop" id="styleModal">
  <div class="modal">
    <div class="modal-title">Upload Style Sample</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Upload a sample document in the writing style you want ClassMind to replicate (PDF, Word, or TXT).</p>
    <input type="file" id="styleFile" accept=".pdf,.docx,.doc,.txt" style="color:var(--text);padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px">
    <div id="styleStatus" style="margin-top:10px;font-size:13px"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('styleModal')">Close</button>
      <button class="btn-primary" onclick="uploadStyleSample()" id="styleUploadBtn">Analyse Style</button>
    </div>
  </div>
</div>

<script src="/shared.js"></script>
<script>
if (!Auth.requireAuth()) throw new Error('redirect');
renderNav('Projects');

const SECTIONS = [
  { key: 'title_page', label: 'Title Page' },
  { key: 'declaration', label: 'Declaration' },
  { key: 'abstract', label: 'Abstract' },
  { key: 'chapter1', label: 'Chapter 1: Introduction' },
  { key: 'chapter2', label: 'Chapter 2: Literature Review' },
  { key: 'chapter3', label: 'Chapter 3: Methodology' },
  { key: 'chapter4', label: 'Chapter 4: Data & Analysis' },
  { key: 'chapter5', label: 'Chapter 5: Summary' },
  { key: 'references', label: 'References' },
];

let projects = [];
let currentProject = null;
let currentSection = SECTIONS[0].key;
let projectContent = {};

async function loadProjects() {
  const res = await Auth.fetchWithAuth('/api/projects');
  if (!res || !res.ok) return;
  projects = await res.json();
  renderProjectGrid();
}

function renderProjectGrid() {
  const grid = document.getElementById('projectsGrid');
  if (!projects.length) {
    grid.innerHTML = '<div style="color:var(--muted);grid-column:1/-1;text-align:center;padding:60px"><div style="font-size:40px;margin-bottom:12px">🏗</div><strong>No projects yet</strong><br><span style="font-size:13px">Create your first project to get started.</span></div>';
    return;
  }
  grid.innerHTML = projects.map(p => `
    <div class="project-card" onclick="openProject(${p.id})">
      <div class="project-status">
        <span class="badge badge-blue">${escHtmlClient(p.status)}</span>
      </div>
      <div class="project-title">${escHtmlClient(p.title)}</div>
      <div class="project-meta">${escHtmlClient(p.subject || 'No subject')} · ${escHtmlClient(p.project_type)}</div>
      <div style="font-size:11px;color:var(--muted)">${formatDate(p.updated_at)}</div>
      <div class="project-card-actions" onclick="event.stopPropagation()">
        <button class="btn-sm btn-danger" onclick="deleteProject(${p.id})">Delete</button>
      </div>
    </div>
  `).join('');
}

async function openProject(id) {
  const res = await Auth.fetchWithAuth('/api/projects/' + id);
  if (!res || !res.ok) return;
  currentProject = await res.json();
  try { projectContent = JSON.parse(currentProject.content || '{}'); } catch { projectContent = {}; }

  document.getElementById('listView').style.display = 'none';
  document.getElementById('editorView').style.display = 'block';
  document.getElementById('editorTitle').textContent = currentProject.title;
  document.getElementById('editorSubtitle').textContent = (currentProject.subject || '') + (currentProject.project_type ? ' · ' + currentProject.project_type : '');

  renderSectionNav();
  selectSection(SECTIONS[0].key);

  if (currentProject.research_notes) {
    document.getElementById('researchNotesArea').style.display = 'block';
    document.getElementById('researchNotesContent').textContent = currentProject.research_notes;
  }
}

function renderSectionNav() {
  document.getElementById('sectionNav').innerHTML = SECTIONS.map(s => `
    <div class="section-nav-item${s.key === currentSection ? ' active' : ''}${projectContent[s.key] ? ' done' : ''}"
         onclick="selectSection('${s.key}')">${s.label}</div>
  `).join('');
}

function selectSection(key) {
  currentSection = key;
  const sectionObj = SECTIONS.find(s => s.key === key);
  document.getElementById('sectionTitle').textContent = sectionObj ? sectionObj.label : key;
  document.getElementById('sectionContent').textContent = projectContent[key] || '';
  document.getElementById('extraInstructions').value = '';
  renderSectionNav();
}

async function generateSection() {
  if (!currentProject) return;
  const btn = document.getElementById('generateBtn');
  const extra = document.getElementById('extraInstructions').value.trim();
  btn.disabled = true;
  btn.textContent = '⏳ Generating…';
  document.getElementById('sectionContent').textContent = 'Generating content, please wait…';

  const res = await Auth.fetchWithAuth('/api/projects/' + currentProject.id + '/generate', {
    method: 'POST',
    body: JSON.stringify({ section: currentSection, extra_instructions: extra || undefined })
  });

  if (res && res.ok) {
    const data = await res.json();
    projectContent[currentSection] = data.content;
    document.getElementById('sectionContent').textContent = data.content;
    showToast('Section generated!', 'success');
    renderSectionNav();
  } else {
    const err = res ? await res.json() : { error: 'Generation failed.' };
    document.getElementById('sectionContent').textContent = '';
    showToast(err.error || 'Generation failed.', 'error');
  }

  btn.disabled = false;
  btn.textContent = '✦ Generate with AI';
}

async function saveSectionContent() {
  if (!currentProject) return;
  const text = document.getElementById('sectionContent').textContent || '';
  projectContent[currentSection] = text;
  const res = await Auth.fetchWithAuth('/api/projects/' + currentProject.id, {
    method: 'PUT',
    body: JSON.stringify({ content: JSON.stringify(projectContent) })
  });
  if (res && res.ok) { showToast('Saved!', 'success'); renderSectionNav(); }
  else showToast('Save failed.', 'error');
}

function clearSectionContent() {
  document.getElementById('sectionContent').textContent = '';
}

function backToList() {
  document.getElementById('editorView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
  currentProject = null;
  loadProjects();
}

async function deleteProject(id) {
  if (!confirm('Delete this project? This cannot be undone.')) return;
  const res = await Auth.fetchWithAuth('/api/projects/' + id, { method: 'DELETE' });
  if (res && res.ok) { showToast('Project deleted.', 'success'); loadProjects(); }
  else showToast('Delete failed.', 'error');
}

function showCreateModal() { document.getElementById('createModal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function createProject() {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) { showToast('Title is required.', 'error'); return; }
  const btn = document.getElementById('createBtn');
  btn.disabled = true;
  const res = await Auth.fetchWithAuth('/api/projects', {
    method: 'POST',
    body: JSON.stringify({
      title,
      subject: document.getElementById('newSubject').value.trim(),
      project_type: document.getElementById('newType').value,
      description: document.getElementById('newDesc').value.trim()
    })
  });
  btn.disabled = false;
  if (res && res.ok) {
    const p = await res.json();
    closeModal('createModal');
    document.getElementById('newTitle').value = '';
    document.getElementById('newSubject').value = '';
    document.getElementById('newDesc').value = '';
    openProject(p.id);
  } else {
    const err = res ? await res.json() : { error: 'Failed to create project.' };
    showToast(err.error || 'Failed.', 'error');
  }
}

function showResearch() {
  const panel = document.getElementById('researchPanelEl');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

async function doResearch() {
  if (!currentProject) return;
  const query = document.getElementById('researchQuery').value.trim();
  if (!query) { showToast('Enter a research query.', 'error'); return; }
  const btn = document.getElementById('researchBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Searching…';
  document.getElementById('researchResult').style.display = 'block';
  document.getElementById('researchResult').textContent = 'Searching the web and synthesising…';
  document.getElementById('sourceList').innerHTML = '';

  const res = await Auth.fetchWithAuth('/api/projects/' + currentProject.id + '/research', {
    method: 'POST',
    body: JSON.stringify({ query })
  });

  btn.disabled = false;
  btn.textContent = 'Search';

  if (res && res.ok) {
    const data = await res.json();
    document.getElementById('researchResult').textContent = data.summary;
    if (data.sources && data.sources.length) {
      document.getElementById('sourceList').innerHTML = '<strong style="font-size:12px;color:var(--muted)">Sources:</strong>' +
        data.sources.map(s => `<div class="source-item"><a href="${escHtmlClient(s.url)}" target="_blank" rel="noopener">${escHtmlClient(s.title)}</a></div>`).join('');
    }
    if (currentProject.research_notes !== undefined) {
      currentProject.research_notes = (currentProject.research_notes || '') + '\n';
    }
    document.getElementById('researchNotesArea').style.display = 'block';
    const noteEl = document.getElementById('researchNotesContent');
    noteEl.textContent = data.summary + '\n\n' + (noteEl.textContent || '');
    showToast('Research complete!', 'success');
  } else {
    const err = res ? await res.json() : { error: 'Research failed.' };
    document.getElementById('researchResult').textContent = 'Error: ' + (err.error || 'Research failed.');
    showToast(err.error || 'Research failed.', 'error');
  }
}

function showStyleUpload() { document.getElementById('styleModal').classList.add('open'); }

async function uploadStyleSample() {
  if (!currentProject) return;
  const file = document.getElementById('styleFile').files[0];
  if (!file) { showToast('Select a file.', 'error'); return; }
  const btn = document.getElementById('styleUploadBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Analysing…';
  document.getElementById('styleStatus').textContent = 'Analysing writing style…';

  const form = new FormData();
  form.append('file', file);
  const res = await Auth.fetchWithAuth('/api/projects/' + currentProject.id + '/style-sample', {
    method: 'POST',
    body: form
  });

  btn.disabled = false;
  btn.textContent = 'Analyse Style';
  if (res && res.ok) {
    document.getElementById('styleStatus').innerHTML = '<div class="alert alert-success" style="margin:0">Style profile saved! AI will now mimic this writing style.</div>';
    showToast('Style profile saved.', 'success');
  } else {
    const err = res ? await res.json() : { error: 'Failed.' };
    document.getElementById('styleStatus').innerHTML = '<div class="alert alert-error" style="margin:0">' + escHtmlClient(err.error || 'Failed.') + '</div>';
  }
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

['createModal', 'styleModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) closeModal(id);
  });
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    ['createModal', 'styleModal'].forEach(id => closeModal(id));
  }
});

loadProjects();
</script>
</body>
</html>
