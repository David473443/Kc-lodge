<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CGPA Calculator — ClassMind AI</title>
  <style>
    .page-header { padding: 28px 32px 0; }
    .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .page-header p { color: var(--muted); font-size: 14px; }
    .page-content { padding: 24px 32px 40px; max-width: 900px; }

    .calc-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .calc-card .card-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; }

    .course-table { width: 100%; border-collapse: collapse; }
    .course-table th { text-align: left; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 0 8px 10px; }
    .course-table td { padding: 6px 8px; vertical-align: middle; }
    .course-table td input, .course-table td select { padding: 8px 10px; font-size: 13px; }
    .course-table td:first-child { width: 40%; }
    .course-table td:nth-child(2) { width: 20%; }
    .course-table td:nth-child(3) { width: 15%; }
    .course-table td:nth-child(4) { width: 10%; text-align: center; color: var(--muted); font-size: 13px; }
    .course-table td:last-child { width: 8%; }
    .btn-remove { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 2px 6px; }
    .btn-remove:hover { color: var(--danger); }

    .results-section { display: flex; flex-direction: column; gap: 16px; }

    .result-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .result-semester { font-size: 14px; font-weight: 700; color: var(--text2); }
    .gpa-display { text-align: center; }
    .gpa-number { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; line-height: 1; }
    .gpa-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .gpa-class { font-size: 14px; font-weight: 700; margin-top: 6px; }
    .gpa-class.first { color: #22C55E; }
    .gpa-class.upper-second { color: #3B82F6; }
    .gpa-class.lower-second { color: #F59E0B; }
    .gpa-class.third { color: #F97316; }
    .gpa-class.pass { color: var(--muted); }

    .result-meta { font-size: 13px; color: var(--muted); margin-top: 8px; }
    .result-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
    .result-table th { text-align: left; padding: 6px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); border-bottom: 1px solid var(--border); }
    .result-table td { padding: 8px 10px; border-bottom: 1px solid rgba(51,65,85,.3); }
    .result-table tr:last-child td { border-bottom: none; }

    .cumulative-banner { background: linear-gradient(135deg, #1d4ed8, #3B82F6); border-radius: var(--radius); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .cum-label { font-size: 13px; color: rgba(255,255,255,.8); }
    .cum-value { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; color: #fff; }
    .cum-class { font-size: 14px; font-weight: 700; color: rgba(255,255,255,.9); margin-top: 2px; }

    @media (max-width: 768px) {
      .page-content { padding: 16px 16px 40px; }
      .course-table td:first-child { width: 30%; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>CGPA Calculator</h1>
  <p>Calculate your GPA using the Nigerian 5-point grading scale.</p>
</div>
<div class="page-content">

  <div id="cumulativeBanner" style="display:none" class="cumulative-banner">
    <div>
      <div class="cum-label">Cumulative CGPA (all semesters)</div>
      <div class="cum-class" id="cumClass"></div>
    </div>
    <div class="cum-value" id="cumValue">—</div>
  </div>

  <div class="calc-card">
    <div class="card-title">Add Semester</div>

    <div style="margin-bottom:14px">
      <label style="display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px">Semester Label</label>
      <input id="semesterLabel" placeholder="e.g. 300L First Semester" style="max-width:320px">
    </div>

    <table class="course-table">
      <thead>
        <tr>
          <th>Course / Subject</th>
          <th>Grade</th>
          <th>Credit Units</th>
          <th>GP</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="courseRows"></tbody>
    </table>

    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn-secondary btn-sm" onclick="addRow()">+ Add Course</button>
      <button class="btn-primary" onclick="calculate()">Calculate GPA</button>
    </div>
  </div>

  <div class="results-section" id="resultsSection"></div>
</div>

<script src="/shared.js"></script>
<script>
if (!Auth.requireAuth()) throw new Error('redirect');
renderNav('CGPA');

const GP_MAP = { A: 5, B: 4, C: 3, D: 2, E: 1, F: 0 };
let semesters = [];

function addRow(subject = '', grade = '', units = '') {
  const tbody = document.getElementById('courseRows');
  const tr = document.createElement('tr');
  const rowId = 'row_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  tr.dataset.id = rowId;
  tr.innerHTML = `
    <td><input type="text" placeholder="e.g. CSC301 Algorithms" value="${escHtmlClient(subject)}"></td>
    <td>
      <select>
        <option value="">—</option>
        ${['A','B','C','D','E','F'].map(g => `<option value="${g}"${g === grade ? ' selected' : ''}>${g}</option>`).join('')}
      </select>
    </td>
    <td><input type="number" min="1" max="6" value="${escHtmlClient(String(units))}" placeholder="3"></td>
    <td class="gp-cell">—</td>
    <td><button type="button" class="btn-remove" onclick="removeRow('${rowId}')">×</button></td>
  `;
  tbody.appendChild(tr);
  updateGPCells(tr);
  tr.querySelector('select').addEventListener('change', () => updateGPCells(tr));
}

function removeRow(id) {
  const row = document.querySelector(`[data-id="${id}"]`);
  if (row) {
    const tbody = document.getElementById('courseRows');
    if (tbody.rows.length > 1) row.remove();
    else showToast('At least one course row required.', 'warn');
  }
}

function updateGPCells(tr) {
  const grade = tr.querySelector('select').value;
  const gpCell = tr.querySelector('.gp-cell');
  gpCell.textContent = grade in GP_MAP ? GP_MAP[grade] : '—';
}

function getRows() {
  const rows = [];
  document.getElementById('courseRows').querySelectorAll('tr').forEach(tr => {
    const inputs = tr.querySelectorAll('input, select');
    rows.push({
      subject: inputs[0].value.trim(),
      grade: inputs[1].value,
      units: parseInt(inputs[2].value) || 0
    });
  });
  return rows;
}

async function calculate() {
  const courses = getRows();
  const label = document.getElementById('semesterLabel').value.trim() || 'Semester ' + (semesters.length + 1);

  const res = await Auth.fetchWithAuth('/api/cgpa/calculate', {
    method: 'POST',
    body: JSON.stringify({ courses })
  });
  if (!res || !res.ok) {
    const err = res ? await res.json() : { error: 'Calculation failed.' };
    showToast(err.error || 'Calculation failed.', 'error');
    return;
  }

  const data = await res.json();
  semesters.push({ label, data });
  renderResults();
  updateCumulative();
}

function renderResults() {
  const section = document.getElementById('resultsSection');
  section.innerHTML = '';
  semesters.slice().reverse().forEach((sem, i) => {
    const { label, data } = sem;
    const cls = gpaClass(data.gpa);
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-header">
        <div>
          <div class="result-semester">${escHtmlClient(label)}</div>
          <div class="result-meta">Total Units: ${data.total_units} · Quality Points: ${data.total_quality_points}</div>
        </div>
        <div class="gpa-display">
          <div class="gpa-number" style="color:${gpaColor(data.gpa)}">${data.gpa.toFixed(2)}</div>
          <div class="gpa-label">GPA / 5.00</div>
          <div class="gpa-class ${cls.cssClass}">${cls.label}</div>
        </div>
      </div>
      <table class="result-table">
        <thead><tr><th>Course</th><th>Grade</th><th>Units</th><th>GP</th><th>Quality Points</th></tr></thead>
        <tbody>${data.courses.map(c => `
          <tr>
            <td>${escHtmlClient(c.subject || '—')}</td>
            <td>${escHtmlClient(c.grade || '—')}</td>
            <td>${c.units}</td>
            <td>${c.grade_point !== null ? c.grade_point : '—'}</td>
            <td>${c.grade_point !== null ? c.grade_point * c.units : '—'}</td>
          </tr>
        `).join('')}</tbody>
      </table>
      <div style="margin-top:14px;text-align:right">
        <button class="btn-secondary btn-sm" onclick="removeSemester(${semesters.length - 1 - i})">Remove</button>
      </div>
    `;
    section.appendChild(card);
  });
}

function removeSemester(idx) {
  semesters.splice(idx, 1);
  renderResults();
  updateCumulative();
}

function updateCumulative() {
  const banner = document.getElementById('cumulativeBanner');
  if (semesters.length < 2) { banner.style.display = 'none'; return; }
  let totalQP = 0, totalUnits = 0;
  semesters.forEach(s => {
    totalQP += s.data.total_quality_points;
    totalUnits += s.data.total_units;
  });
  const cgpa = totalUnits > 0 ? totalQP / totalUnits : 0;
  const cls = gpaClass(cgpa);
  document.getElementById('cumValue').textContent = cgpa.toFixed(2);
  document.getElementById('cumClass').textContent = cls.label;
  banner.style.display = 'flex';
}

function gpaClass(gpa) {
  if (gpa >= 4.5) return { label: 'First Class Honours', cssClass: 'first' };
  if (gpa >= 3.5) return { label: 'Second Class Upper (2:1)', cssClass: 'upper-second' };
  if (gpa >= 2.4) return { label: 'Second Class Lower (2:2)', cssClass: 'lower-second' };
  if (gpa >= 1.5) return { label: 'Third Class', cssClass: 'third' };
  if (gpa > 0)   return { label: 'Pass', cssClass: 'pass' };
  return { label: 'No data', cssClass: 'pass' };
}

function gpaColor(gpa) {
  if (gpa >= 4.5) return 'var(--success)';
  if (gpa >= 3.5) return 'var(--accent)';
  if (gpa >= 2.4) return 'var(--warn)';
  return 'var(--danger)';
}

addRow();
addRow();
addRow();
</script>
</body>
</html>
