<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ClassMind AI</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F6F6F3; color: #141414; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border: 1px solid #E2E2DC; border-radius: 18px; padding: 44px 40px; width: min(440px, 100%); box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 32px; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 22px; color: #1B3F6E; font-weight: 700; }
    .logo-badge { background: #C4933F; color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; padding: 3px 8px; border-radius: 5px; margin-left: 4px; }
    h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: #1B3F6E; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #747474; margin-bottom: 28px; line-height: 1.5; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .hint { font-size: 11px; color: #747474; margin-top: 4px; }
    .input-wrap { position: relative; }
    input[type="password"], input[type="text"] { width: 100%; background: #fff; border: 1.5px solid #E2E2DC; border-radius: 9px; padding: 11px 44px 11px 14px; font-family: 'Inter', sans-serif; font-size: 14px; color: #141414; outline: none; transition: border-color .2s; }
    input:focus { border-color: #1B3F6E; box-shadow: 0 0 0 3px rgba(27,63,110,0.08); }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: #747474; }
    .form-group { margin-bottom: 20px; }
    .strength-bar { height: 4px; border-radius: 2px; background: #E2E2DC; margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }
    .btn { width: 100%; padding: 13px; border-radius: 9px; border: none; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .18s; }
    .btn-primary { background: #1B3F6E; color: #fff; }
    .btn-primary:hover { background: #15335A; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 12px 16px; border-radius: 9px; font-size: 13px; font-weight: 500; margin-bottom: 20px; display: none; }
    .alert-success { background: #F0FDF4; color: #15803D; border: 1.5px solid #BBF7D0; }
    .alert-error { background: #FEF2F2; color: #B91C1C; border: 1.5px solid #FECACA; }
    .back-link { display: block; text-align: center; margin-top: 22px; font-size: 13px; color: #747474; text-decoration: none; }
    .back-link span { color: #1B3F6E; font-weight: 600; }
    .back-link:hover span { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="11" fill="#1B3F6E"/>
        <path d="M8 34V18C8 16.34 9.34 15 11 15H23V34Q16 32 11 32C9.34 32 8 33.34 8 35Z" fill="white" opacity="0.92"/>
        <path d="M40 34V18C40 16.34 38.66 15 37 15H25V34Q32 32 37 32C38.66 32 40 33.34 40 35Z" fill="white" opacity="0.7"/>
        <circle cx="24" cy="8.5" r="3" fill="#C4933F"/>
      </svg>
      <span class="logo-text">ClassMind<span class="logo-badge">AI</span></span>
    </div>

    <h2>Set a new password</h2>
    <p class="sub">Choose a strong password for your ClassMind AI account.</p>

    <div class="alert alert-error" id="errorMsg"></div>

    <form id="resetForm" onsubmit="submitReset(event)">
      <div class="form-group">
        <label for="pw">New password</label>
        <div class="input-wrap">
          <input type="password" id="pw" placeholder="At least 8 characters" required minlength="8" oninput="checkStrength(this.value)" />
          <button type="button" class="toggle-pw" onclick="toggleVis('pw', this)">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="hint" id="strengthLabel"></div>
      </div>
      <div class="form-group">
        <label for="pw2">Confirm password</label>
        <div class="input-wrap">
          <input type="password" id="pw2" placeholder="Repeat your password" required />
          <button type="button" class="toggle-pw" onclick="toggleVis('pw2', this)">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Reset Password</button>
    </form>

    <a href="/login.html" class="back-link">← Back to <span>Sign In</span></a>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('errorMsg').textContent = 'Invalid or missing reset link. Please request a new one.';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
    }

    function toggleVis(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁' : '🙈';
    }

    function checkStrength(val) {
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 8) score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const pcts = ['0%','25%','50%','75%','100%'];
      const colors = ['#E2E2DC','#B91C1C','#B45309','#C4933F','#15803D'];
      const labels = ['','Weak','Fair','Good','Strong'];
      fill.style.width = pcts[score] || '0%';
      fill.style.background = colors[score] || '#E2E2DC';
      label.textContent = labels[score] || '';
    }

    async function submitReset(e) {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      if (pw !== pw2) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }
      if (pw.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return; }
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Resetting…';
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/login.html?reset=1';
        } else {
          errEl.textContent = data.error || 'Reset failed. The link may have expired.';
          errEl.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Reset Password';
        }
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
