<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reminders — ClassMind AI</title>
  <style>
    .page-header { padding: 28px 32px 0; }
    .page-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .page-header p { color: var(--muted); font-size: 14px; }
    .page-content { padding: 24px 32px 40px; }

    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }

    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .section-block { margin-bottom: 32px; }

    .rm-list { display: flex; flex-direction: column; gap: 8px; }
    .rm-empty { text-align: center; padding: 28px 16px; color: var(--muted); font-size: 13px; background: var(--card2); border: 1px dashed var(--border); border-radius: var(--radius); }
    .rm-empty-icon { font-size: 26px; margin-bottom: 8px; }

    .rm-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 14px; transition: box-shadow .15s; }
    .rm-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,.25); }
    .rm-item.triggered { opacity: .7; }
    .rm-item.disabled { opacity: .45; }

    .rm-body { flex: 1; min-width: 0; }
    .rm-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rm-notes { font-size: 12px; color: var(--muted); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rm-time { font-size: 12px; font-weight: 600; }
    .rm-time.urgent { color: var(--danger); }
    .rm-time.soon { color: var(--warn); }
    .rm-time.ok { color: var(--success); }
    .rm-time.past { color: var(--muted); font-weight: 400; }

    .rm-badges { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    .toggle-wrap { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 11px; cursor: pointer; transition: background .2s; }
    .toggle-slider:before { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #fff; left: 3px; top: 3px; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .toggle-wrap input:checked + .toggle-slider { background: var(--accent); }
    .toggle-wrap input:checked + .toggle-slider:before { transform: translateX(18px); }
    .toggle-wrap input:disabled + .toggle-slider { opacity: .5; cursor: not-allowed; }

    .rm-delete { background: none; border: none; color: var(--muted); font-size: 15px; cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: all .15s; flex-shrink: 0; }
    .rm-delete:hover { color: var(--danger); background: rgba(239,68,68,.1); }

    .spinner-wrap { text-align: center; padding: 40px 20px; }
    .spinner-wrap .spinner { margin: 0 auto 12px; }

    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 2px; line-height: 1; }
    .close-btn:hover { color: var(--danger); }

    @media (max-width: 768px) { .page-header { padding: 20px 16px 0; } .page-content { padding: 16px 16px 40px; } }
  </style>
</head>
<body>
<div class="page-header">
  <h1>Reminders</h1>
  <p>Stay on top of deadlines and important events</p>
</div>
<div class="page-content">
  <div class="topbar">
    <div style="font-size:14px;color:var(--text2)">Manage your study reminders and alerts</div>
    <button class="btn-primary" onclick="openAddModal()">+ Add Reminder</button>
  </div>

  <div id="loadingWrap" class="spinner-wrap">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-size:14px">Loading reminders…</p>
  </div>

  <div id="reminderSections" style="display:none">
    <div class="section-block">
      <div class="section-label">Upcoming</div>
      <div class="rm-list" id="listUpcoming">
        <div class="rm-empty"><div class="rm-empty-icon">🔔</div>No upcoming reminders.</div>
      </div>
    </div>
    <div class="section-block">
      <div class="section-label">Triggered</div>
      <div class="rm-list" id="listTriggered">
        <div class="rm-empty"><div class="rm-empty-icon">✅</div>No triggered reminders.</div>
      </div>
    </div>
    <div class="section-block">
      <div class="section-label">Disabled</div>
      <div class="rm-list" id="listDisabled">
        <div class="rm-empty"><div class="rm-empty-icon">🔕</div>No disabled reminders.</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Reminder</div>
      <button class="close-btn" onclick="closeModal()">&#xD7;</button>
    </div>
    <div class="form-group">
      <label>Title <span style="color:var(--danger)">*</span></label>
      <input type="text" id="a-title" placeholder="e.g. Submit MTH301 assignment" />
    </div>
    <div class="form-group">
      <label>Notes <span style="color:var(--muted);font-weight:400">(optional)</span></label>
      <textarea id="a-body" rows="3" placeholder="Any extra details…" style="resize:vertical"></textarea>
    </div>
    <div class="form-group">
      <label>Date &amp; Time <span style="color:var(--danger)">*</span></label>
      <input type="datetime-local" id="a-datetime" />
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="addBtn" onclick="submitAdd()">Set Reminder</button>
    </div>
  </div>
</div>

<script src="/shared.js"></script>
<script>
if (!Auth.requireAuth()) throw new Error('redirect');
renderNav('Reminders');

let allReminders = [];

function esc(s) { return escHtmlClient(s); }

function formatDateTime(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }) +
    ' at ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function timeClass(str) {
  if (!str) return 'past';
  const diff = new Date(str) - Date.now();
  if (diff < 0) return 'past';
  const hours = diff / 3600000;
  if (hours < 3) return 'urgent';
  if (hours < 24) return 'soon';
  return 'ok';
}

function buildItem(r) {
  const isDisabled = !r.enabled;
  const isTriggered = !!r.triggered;
  const cls = isDisabled ? 'disabled' : isTriggered ? 'triggered' : '';
  const timeCls = (isDisabled || isTriggered) ? 'past' : timeClass(r.remind_at);
  return '<div class="rm-item ' + cls + '" id="ri-' + r.id + '">' +
    '<div class="rm-body">' +
      '<div class="rm-title">' + esc(r.title) + '</div>' +
      (r.body ? '<div class="rm-notes">' + esc(r.body) + '</div>' : '') +
      '<div class="rm-time ' + timeCls + '">⏰ ' + esc(formatDateTime(r.remind_at)) + '</div>' +
    '</div>' +
    '<div class="rm-badges">' +
      (isTriggered ? '<span class="badge badge-green">Triggered</span>' : '') +
    '</div>' +
    '<label class="toggle-wrap" title="' + (r.enabled ? 'Disable' : 'Enable') + '">' +
      '<input type="checkbox" ' + (r.enabled ? 'checked' : '') + ' onchange="toggleReminder(' + r.id + ', this.checked)">' +
      '<span class="toggle-slider"></span>' +
    '</label>' +
    '<button class="rm-delete" title="Delete" onclick="deleteReminder(' + r.id + ')">🗑</button>' +
  '</div>';
}

function renderLists() {
  const upcoming = allReminders.filter(r => !r.triggered && r.enabled);
  const triggered = allReminders.filter(r => !!r.triggered);
  const disabled = allReminders.filter(r => !r.triggered && !r.enabled);

  upcoming.sort((a, b) => new Date(a.remind_at) - new Date(b.remind_at));
  triggered.sort((a, b) => new Date(b.remind_at) - new Date(a.remind_at));
  disabled.sort((a, b) => new Date(a.remind_at) - new Date(b.remind_at));

  const emptyUpcoming = '<div class="rm-empty"><div class="rm-empty-icon">🔔</div>No upcoming reminders. Add your first reminder above.</div>';
  const emptyTriggered = '<div class="rm-empty"><div class="rm-empty-icon">✅</div>No triggered reminders.</div>';
  const emptyDisabled = '<div class="rm-empty"><div class="rm-empty-icon">🔕</div>No disabled reminders.</div>';

  document.getElementById('listUpcoming').innerHTML = upcoming.length ? upcoming.map(buildItem).join('') : emptyUpcoming;
  document.getElementById('listTriggered').innerHTML = triggered.length ? triggered.map(buildItem).join('') : emptyTriggered;
  document.getElementById('listDisabled').innerHTML = disabled.length ? disabled.map(buildItem).join('') : emptyDisabled;
}

async function loadReminders() {
  document.getElementById('loadingWrap').style.display = 'block';
  document.getElementById('reminderSections').style.display = 'none';
  const res = await Auth.fetchWithAuth('/api/reminders');
  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('reminderSections').style.display = 'block';
  if (!res || !res.ok) { showToast('Could not load reminders', 'error'); return; }
  allReminders = await res.json();
  if (!Array.isArray(allReminders)) allReminders = [];
  renderLists();
}

async function toggleReminder(id, enabled) {
  const r = allReminders.find(x => x.id === id);
  if (!r) return;
  const prev = r.enabled;
  r.enabled = enabled ? 1 : 0;
  renderLists();
  const res = await Auth.fetchWithAuth('/api/reminders/' + id, { method: 'PATCH', body: JSON.stringify({ enabled: enabled ? 1 : 0 }) });
  if (!res || !res.ok) { r.enabled = prev; renderLists(); showToast('Could not update reminder', 'error'); return; }
  showToast(enabled ? 'Reminder enabled' : 'Reminder disabled', 'success');
}

async function deleteReminder(id) {
  if (!confirm('Delete this reminder?')) return;
  const prev = allReminders.slice();
  allReminders = allReminders.filter(r => r.id !== id);
  renderLists();
  const res = await Auth.fetchWithAuth('/api/reminders/' + id, { method: 'DELETE' });
  if (!res || !res.ok) { allReminders = prev; renderLists(); showToast('Could not delete reminder', 'error'); return; }
  showToast('Reminder deleted', 'success');
}

function openAddModal() {
  const def = new Date(Date.now() + 3600000);
  const pad = n => String(n).padStart(2, '0');
  const localStr = def.getFullYear() + '-' + pad(def.getMonth() + 1) + '-' + pad(def.getDate()) + 'T' + pad(def.getHours()) + ':' + pad(def.getMinutes());
  document.getElementById('a-title').value = '';
  document.getElementById('a-body').value = '';
  document.getElementById('a-datetime').value = localStr;
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('a-title').focus(), 50);
}

async function submitAdd() {
  const title = document.getElementById('a-title').value.trim();
  const body = document.getElementById('a-body').value.trim();
  const dt = document.getElementById('a-datetime').value;
  if (!title) { showToast('Title is required', 'error'); document.getElementById('a-title').focus(); return; }
  if (!dt) { showToast('Date and time are required', 'error'); return; }
  if (new Date(dt) <= new Date()) { showToast('Please choose a future date and time', 'error'); return; }
  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const res = await Auth.fetchWithAuth('/api/reminders', { method: 'POST', body: JSON.stringify({ title, body, remind_at: new Date(dt).toISOString() }) });
  btn.disabled = false; btn.textContent = 'Set Reminder';
  if (!res || !res.ok) { const e = await res.json().catch(() => ({})); showToast(e.error || 'Could not add reminder', 'error'); return; }
  const reminder = await res.json();
  allReminders.push(reminder);
  renderLists();
  closeModal();
  showToast('Reminder set!', 'success');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('open');
}

document.getElementById('addModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

loadReminders();
</script>
</body>
</html>
