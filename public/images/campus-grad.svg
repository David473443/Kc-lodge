  <!-- Diagonal accent lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none">
    <line x1="0" y1="900" x2="700" y2="0"/>
    <line x1="200" y1="900" x2="900" y2="0"/>
    <line x1="400" y1="900" x2="1100" y2="0"/>
    <line x1="600" y1="900" x2="1300" y2="0"/>
    <line x1="800" y1="900" x2="1400" y2="100"/>
  </g>
