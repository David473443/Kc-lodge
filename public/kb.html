<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Course Chat — ClassMind AI</title>
  <style>
    .kb-layout { display: flex; gap: 20px; height: calc(100vh - 120px); }
    .kb-left { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
    .kb-right { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .course-selector { display: flex; gap: 8px; }
    .course-selector select { flex: 1; }
    .course-form { display: flex; flex-direction: column; gap: 10px; }
    .doc-list { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
    .doc-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
    .doc-item-info { flex: 1; min-width: 0; }
    .doc-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-meta { font-size: 11px; color: var(--muted); }
    .doc-delete { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; flex-shrink: 0; }
    .doc-delete:hover { color: var(--danger); }
    .upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; transition: border-color .15s; }
    .upload-area:hover, .upload-area.drag { border-color: var(--accent); background: var(--accent-light); }
    .upload-area input[type=file] { display: none; }
    .upload-area p { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .chat-container { flex: 1; display: flex; flex-direction: column; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .chat-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .msg { display: flex; flex-direction: column; max-width: 80%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.ai { align-self: flex-start; align-items: flex-start; }
    .msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .msg.ai .msg-bubble { background: var(--card2); color: var(--text); border-bottom-left-radius: 4px; }
    .msg.ai.question .msg-bubble { border-left: 3px solid var(--warn); }
    .msg-sources { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .chat-input-area { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    .chat-input-area textarea { flex: 1; resize: none; min-height: 44px; max-height: 120px; padding: 10px 14px; font-size: 14px; border-radius: 10px; }
    .chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); text-align: center; padding: 40px; }
    .style-toggle { font-size: 12px; color: var(--muted); cursor: pointer; background: none; border: none; text-decoration: underline; }
    .style-panel { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg2); display: none; }
    .style-panel.open { display: block; }
    .new-course-row { display: flex; gap: 8px; }
    .new-course-row input { flex: 1; }
    @media (max-width: 768px) {
      .kb-layout { flex-direction: column; height: auto; }
      .kb-left { width: 100%; }
      .kb-right { height: 60vh; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Course Chat</h1>
  <p>Upload your course materials and chat with them using AI.</p>
</div>
<div class="page-content">
  <div class="kb-layout">

    <!-- LEFT: Knowledge Base -->
    <div class="kb-left">
      <div class="card">
        <div class="card-title">Course</div>
        <div class="course-selector">
          <select id="courseSelect" onchange="onCourseChange()">
            <option value="">— Select course —</option>
          </select>
          <button class="btn-sm btn-secondary" onclick="showNewCourse()" style="flex-shrink:0">+</button>
        </div>
        <div id="newCourseArea" style="display:none;margin-top:12px">
          <div class="new-course-row">
            <input id="newCode" placeholder="Code e.g. CSC301" style="text-transform:uppercase">
            <input id="newName" placeholder="Name (optional)">
          </div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn-sm btn-primary" onclick="addCourse()" style="flex:1">Add</button>
            <button class="btn-sm btn-secondary" onclick="hideNewCourse()" style="flex:1">Cancel</button>
          </div>
        </div>
      </div>

      <div class="card" id="uploadCard" style="display:none">
        <div class="card-title">Upload Document</div>
        <select id="docType" style="margin-bottom:10px">
          <option value="notes">Lecture Notes</option>
          <option value="past_questions">Past Questions</option>
          <option value="textbook">Textbook Excerpt</option>
          <option value="other">Other</option>
        </select>
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt" onchange="onFileSelect(event)">
          <div style="font-size:22px">📁</div>
          <strong style="font-size:13px">Click or drag to upload</strong>
          <p>PDF, Word (.docx), or TXT</p>
        </div>
        <div id="uploadStatus" style="display:none;margin-top:8px"></div>
      </div>

      <div class="card" id="docsCard" style="display:none">
        <div class="card-title">Uploaded Documents</div>
        <div class="doc-list" id="docList">
          <div class="doc-item" style="color:var(--muted);font-size:13px">No documents yet.</div>
        </div>
        <div id="docsKnowledgeInfo" style="font-size:11px;color:var(--muted);margin-top:10px;text-align:right"></div>
      </div>
    </div>

    <!-- RIGHT: Chat -->
    <div class="kb-right">
      <div class="chat-container">
        <div class="chat-header">
          <div>
            <strong id="chatCourseTitle" style="font-size:15px">No course selected</strong>
            <div style="font-size:12px;color:var(--muted)" id="chatCourseSubtitle"></div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="style-toggle" onclick="toggleStyle()">Style ▾</button>
            <button class="btn-sm btn-secondary" onclick="clearChat()">Clear</button>
          </div>
        </div>

        <div class="style-panel" id="stylePanel">
          <label>How should AI explain things to you?</label>
          <textarea id="styleInput" rows="2" placeholder="e.g. Explain like I'm 16, use bullet points, keep it concise" style="font-size:13px;resize:none"></textarea>
          <button class="btn-sm btn-primary" onclick="saveStyle()" style="margin-top:8px">Save Style</button>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div class="chat-empty">
            <div>
              <div style="font-size:40px;margin-bottom:12px">🧠</div>
              <strong>Select a course to start chatting</strong><br>
              <span style="font-size:13px">Upload your notes, then ask any question about the course.</span>
            </div>
          </div>
        </div>

        <div class="chat-input-area">
          <textarea id="chatInput" placeholder="Ask a question about this course…" rows="1" onkeydown="onChatKey(event)" oninput="autoResize(this)" disabled></textarea>
          <button class="btn-primary" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/shared.js"></script>
<script>
if (!Auth.requireAuth()) throw new Error('redirect');
renderNav('Course Chat');

let courses = [];
let currentCourse = null;
let chatHistory = [];
let isStreaming = false;

async function init() {
  await loadStyle();
  await loadCourses();
}

async function loadCourses() {
  const res = await Auth.fetchWithAuth('/api/kb/courses');
  if (!res || !res.ok) return;
  courses = await res.json();
  const sel = document.getElementById('courseSelect');
  courses.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.course_code;
    opt.textContent = c.course_code + (c.course_name ? ' — ' + c.course_name : '') + ' (' + c.doc_count + ' docs)';
    sel.appendChild(opt);
  });
}

async function onCourseChange() {
  const code = document.getElementById('courseSelect').value;
  if (!code) {
    currentCourse = null;
    document.getElementById('uploadCard').style.display = 'none';
    document.getElementById('docsCard').style.display = 'none';
    document.getElementById('chatCourseTitle').textContent = 'No course selected';
    document.getElementById('chatCourseSubtitle').textContent = '';
    document.getElementById('chatInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
    clearChat();
    return;
  }
  currentCourse = courses.find(c => c.course_code === code) || { course_code: code };
  document.getElementById('uploadCard').style.display = 'block';
  document.getElementById('docsCard').style.display = 'block';
  document.getElementById('chatCourseTitle').textContent = code;
  document.getElementById('chatCourseSubtitle').textContent = currentCourse.course_name || '';
  document.getElementById('chatInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  clearChat();
  await loadDocs(code);
}

async function loadDocs(code) {
  const res = await Auth.fetchWithAuth('/api/kb/' + code + '/docs');
  if (!res || !res.ok) return;
  const docs = await res.json();
  const list = document.getElementById('docList');
  if (!docs.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:13px">No documents yet.</div>';
    document.getElementById('docsKnowledgeInfo').textContent = '';
    return;
  }
  const totalChars = docs.reduce((s, d) => s + (d.chars || 0), 0);
  document.getElementById('docsKnowledgeInfo').textContent = docs.length + ' docs · ' + Math.round(totalChars / 1000) + 'K chars';
  list.innerHTML = docs.map(d => `
    <div class="doc-item">
      <div class="doc-item-info">
        <div class="doc-name" title="${escHtmlClient(d.doc_name)}">${escHtmlClient(d.doc_name)}</div>
        <div class="doc-meta">${d.doc_type} · ${Math.round((d.chars||0)/1000)}K chars</div>
      </div>
      <button class="doc-delete" onclick="deleteDoc(${d.id})" title="Delete">×</button>
    </div>
  `).join('');
}

async function deleteDoc(id) {
  if (!confirm('Delete this document?')) return;
  const res = await Auth.fetchWithAuth('/api/kb/docs/' + id, { method: 'DELETE' });
  if (res && res.ok) {
    showToast('Document deleted.', 'success');
    if (currentCourse) await loadDocs(currentCourse.course_code);
    await refreshCoursesDropdown();
  }
}

async function refreshCoursesDropdown() {
  const sel = document.getElementById('courseSelect');
  const current = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  const res = await Auth.fetchWithAuth('/api/kb/courses');
  if (!res || !res.ok) return;
  courses = await res.json();
  courses.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.course_code;
    opt.textContent = c.course_code + (c.course_name ? ' — ' + c.course_name : '') + ' (' + c.doc_count + ' docs)';
    sel.appendChild(opt);
  });
  sel.value = current;
}

function showNewCourse() { document.getElementById('newCourseArea').style.display = 'block'; }
function hideNewCourse() { document.getElementById('newCourseArea').style.display = 'none'; }

function addCourse() {
  const code = document.getElementById('newCode').value.trim().toUpperCase();
  if (!code) { showToast('Enter a course code.', 'error'); return; }
  const sel = document.getElementById('courseSelect');
  if ([...sel.options].some(o => o.value === code)) {
    sel.value = code;
    hideNewCourse();
    onCourseChange();
    return;
  }
  const opt = document.createElement('option');
  opt.value = code;
  opt.textContent = code + (document.getElementById('newName').value.trim() ? ' — ' + document.getElementById('newName').value.trim() : '');
  sel.appendChild(opt);
  sel.value = code;
  hideNewCourse();
  document.getElementById('newCode').value = '';
  document.getElementById('newName').value = '';
  onCourseChange();
}

function onDragOver(e) { e.preventDefault(); document.getElementById('uploadArea').classList.add('drag'); }
function onDragLeave() { document.getElementById('uploadArea').classList.remove('drag'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('drag');
  const files = e.dataTransfer.files;
  if (files.length) uploadFile(files[0]);
}
function onFileSelect(e) { if (e.target.files.length) uploadFile(e.target.files[0]); }

async function uploadFile(file) {
  if (!currentCourse) { showToast('Select a course first.', 'error'); return; }
  const status = document.getElementById('uploadStatus');
  status.style.display = 'block';
  status.innerHTML = '<div style="display:flex;align-items:center;gap:8px;font-size:13px"><div class="spinner spinner-sm"></div>Uploading…</div>';

  const form = new FormData();
  form.append('file', file);
  form.append('course_code', currentCourse.course_code);
  form.append('doc_type', document.getElementById('docType').value);

  const res = await Auth.fetchWithAuth('/api/kb/upload', { method: 'POST', body: form });
  if (res && res.ok) {
    const data = await res.json();
    status.innerHTML = '<div class="alert alert-success" style="margin:0">Uploaded: ' + escHtmlClient(data.doc_name) + ' (' + Math.round(data.chars/1000) + 'K chars)</div>';
    showToast('Document uploaded successfully!', 'success');
    if (currentCourse) await loadDocs(currentCourse.course_code);
    await refreshCoursesDropdown();
    document.getElementById('fileInput').value = '';
    setTimeout(() => { status.style.display = 'none'; }, 3000);
  } else {
    const err = res ? await res.json() : { error: 'Upload failed.' };
    status.innerHTML = '<div class="alert alert-error" style="margin:0">' + escHtmlClient(err.error || 'Upload failed.') + '</div>';
  }
}

async function sendMessage() {
  if (!currentCourse || isStreaming) return;
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  appendMessage('user', msg);
  input.value = '';
  autoResize(input);
  chatHistory.push({ role: 'user', content: msg });

  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await Auth.fetchWithAuth('/api/kb/chat', {
      method: 'POST',
      body: JSON.stringify({ course_code: currentCourse.course_code, message: msg, history: chatHistory.slice(-20) })
    });
    if (!res || !res.ok) {
      const err = res ? await res.json() : { error: 'Request failed.' };
      appendMessage('ai', 'Error: ' + (err.error || 'Something went wrong.'));
    } else {
      const data = await res.json();
      const isQuestion = data.asked_for_more;
      appendMessage('ai', data.reply, data.sources, isQuestion);
      chatHistory.push({ role: 'assistant', content: data.reply });
    }
  } catch (e) {
    appendMessage('ai', 'Error: Could not reach the server.');
  }

  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
}

function appendMessage(role, text, sources, isQuestion) {
  const messages = document.getElementById('chatMessages');
  const empty = messages.querySelector('.chat-empty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + role + (isQuestion ? ' question' : '');

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  div.appendChild(bubble);

  if (sources && sources.length) {
    const src = document.createElement('div');
    src.className = 'msg-sources';
    src.textContent = 'Sources: ' + sources.join(', ');
    div.appendChild(src);
  }

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function clearChat() {
  chatHistory = [];
  const messages = document.getElementById('chatMessages');
  messages.innerHTML = `<div class="chat-empty">
    <div>
      <div style="font-size:40px;margin-bottom:12px">🧠</div>
      <strong>${currentCourse ? 'Ask anything about ' + currentCourse.course_code : 'Select a course to start chatting'}</strong><br>
      <span style="font-size:13px">Upload your notes, then ask any question.</span>
    </div>
  </div>`;
}

function onChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function toggleStyle() {
  document.getElementById('stylePanel').classList.toggle('open');
}

async function loadStyle() {
  const res = await Auth.fetchWithAuth('/api/style');
  if (res && res.ok) {
    const data = await res.json();
    document.getElementById('styleInput').value = data.style_prompt || '';
  }
}

async function saveStyle() {
  const prompt = document.getElementById('styleInput').value.slice(0, 500);
  const res = await Auth.fetchWithAuth('/api/style', { method: 'PUT', body: JSON.stringify({ style_prompt: prompt }) });
  if (res && res.ok) showToast('Style preference saved.', 'success');
  else showToast('Failed to save style.', 'error');
}

init();
</script>
</body>
</html>
