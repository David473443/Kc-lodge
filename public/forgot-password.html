<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — ClassMind AI</title>
  <meta name="description" content="Reset your ClassMind AI password." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0F172A;
      --bg2: #1E293B;
      --card: #1E293B;
      --border: #334155;
      --accent: #3B82F6;
      --accent-hover: #2563EB;
      --text: #F1F5F9;
      --text2: #CBD5E1;
      --muted: #94A3B8;
      --success: #22C55E;
      --danger: #EF4444;
      --radius: 10px;
      --shadow: 0 4px 32px rgba(0,0,0,0.5);
    }

    html, body { min-height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1B3F6E 0%, #0F172A 100%);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 20px;
    }

    h1, h2 { font-family: 'Playfair Display', serif; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 36px;
      text-decoration: none;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .logo-badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 5px;
      margin-left: 3px;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
    }

    .card-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .alert {
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.55;
      margin-bottom: 24px;
      display: none;
    }

    .alert.show { display: block; }

    .alert-success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
    }

    .alert-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 7px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input::placeholder { color: var(--muted); }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .form-group input.has-error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      margin-bottom: 24px;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .back-link {
      display: block;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
    }

    .back-link:hover { color: var(--text); }
    .back-link span { color: var(--accent); font-weight: 600; }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<div class="card">
  <a href="/" class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5z" fill="white" opacity="0.9"/>
        <path d="M2 17l10 5 10-5" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
        <path d="M2 12l10 5 10-5" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.85"/>
      </svg>
    </div>
    <span class="logo-name">ClassMind<span class="logo-badge">AI</span></span>
  </a>

  <h2 class="card-title">Forgot your password?</h2>
  <p class="card-sub">Enter your email address and we'll send you a link to reset your password.</p>

  <div class="alert alert-success" id="alertSuccess">
    Reset link sent! Check your inbox (and spam folder). If that address is registered, you'll receive an email shortly.
  </div>
  <div class="alert alert-error" id="alertError"></div>

  <form id="forgotForm" novalidate>
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@university.edu.ng" autocomplete="email" required />
    </div>
    <button type="submit" class="btn-primary" id="submitBtn">Send Reset Link</button>
  </form>

  <a href="/login.html" class="back-link">← Back to <span>Sign In</span></a>
</div>

<script>
  document.getElementById('email').addEventListener('input', function() {
    this.classList.remove('has-error');
    document.getElementById('alertError').classList.remove('show');
  });

  document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var email = document.getElementById('email').value.trim();
    var btn = document.getElementById('submitBtn');
    var errEl = document.getElementById('alertError');

    errEl.classList.remove('show');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('email').classList.add('has-error');
      errEl.textContent = 'Please enter a valid email address.';
      errEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
      });
      this.style.display = 'none';
      document.getElementById('alertSuccess').classList.add('show');
    } catch(err) {
      errEl.textContent = 'Network error. Please check your connection and try again.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    }
  });
</script>
</body>
</html>
