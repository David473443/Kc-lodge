<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Study Hub — ClassMind AI</title>
  <style>
    .study-layout {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 22px;
      align-items: start;
    }
    @media (max-width: 900px) { .study-layout { grid-template-columns: 1fr; } }

    .panel-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-head {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }
    .panel-sub { font-size: 12px; color: var(--muted); }
    .panel-body { padding: 18px; }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 14px;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(59,130,246,0.05);
    }
    .drop-icon { font-size: 32px; margin-bottom: 8px; }
    .drop-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .drop-sub { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

    .chips-wrap {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text);
      max-width: 190px;
    }
    .chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .chip-rm { cursor: pointer; color: var(--muted); font-size: 15px; line-height: 1; border: none; background: none; padding: 0; flex-shrink: 0; }
    .chip-rm:hover { color: var(--danger); }

    .divider-or {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; color: var(--muted); font-size: 12px; font-weight: 600;
    }
    .divider-or::before, .divider-or::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    textarea.paste-area {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 11px 13px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      min-height: 110px;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 13px;
    }
    textarea.paste-area:focus { border-color: var(--accent); }
    textarea.paste-area::placeholder { color: var(--muted); }

    .analyse-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .char-count { font-size: 12px; color: var(--muted); }

    .loading-panel {
      display: none;
      text-align: center;
      padding: 60px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .loading-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); margin: 14px 0 5px; }
    .loading-sub { font-size: 13px; color: var(--muted); }

    .result-panel {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .result-topbar {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .result-topbar-title {
      font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--text); flex: 1;
    }

    .overview-box {
      font-size: 14px; line-height: 1.75; color: var(--text2);
      padding: 18px; border-bottom: 1px solid var(--border);
    }

    .tabs-bar {
      display: flex; gap: 0; border-bottom: 2px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .tabs-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 10px 16px; font-family: 'Inter', sans-serif; font-size: 13px;
      font-weight: 600; cursor: pointer; color: var(--muted); border: none;
      background: transparent; white-space: nowrap; transition: color .15s;
      position: relative; bottom: -2px; border-bottom: 2px solid transparent;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-pane { display: none; padding: 18px; }
    .tab-pane.active { display: block; }

    .assign-card {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
      border-left: 4px solid var(--success);
    }
    .assign-card.HIGH { border-left-color: var(--danger); }
    .assign-card.MEDIUM { border-left-color: var(--warn); }
    .assign-card.LOW { border-left-color: var(--success); }
    .assign-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
    .assign-title { font-size: 13px; font-weight: 700; flex: 1; color: var(--text); }
    .prio-badge {
      padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.6px; text-transform: uppercase; flex-shrink: 0;
    }
    .prio-HIGH { background: rgba(239,68,68,.15); color: var(--danger); }
    .prio-MEDIUM { background: rgba(245,158,11,.15); color: var(--warn); }
    .prio-LOW { background: rgba(34,197,94,.15); color: var(--success); }
    .assign-meta { display: flex; gap: 12px; font-size: 12px; color: var(--muted); margin-bottom: 5px; flex-wrap: wrap; }
    .assign-details { font-size: 12px; color: var(--text2); line-height: 1.6; }

    .tt-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tt-table thead th {
      text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted); padding: 0 8px 8px;
      border-bottom: 2px solid var(--border);
    }
    .tt-table tbody tr { border-bottom: 1px solid var(--border); }
    .tt-table tbody tr:last-child { border-bottom: none; }
    .tt-table tbody td { padding: 8px; color: var(--text2); vertical-align: middle; }
    .tt-type {
      padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; white-space: nowrap;
    }
    .type-lecture, .type-class { background: rgba(59,130,246,.12); color: var(--accent); }
    .type-lab { background: rgba(139,92,246,.12); color: #8B5CF6; }
    .type-test { background: rgba(245,158,11,.12); color: var(--warn); }
    .type-exam { background: rgba(239,68,68,.12); color: var(--danger); }
    .type-tutorial, .type-assignment_due { background: rgba(34,197,94,.12); color: var(--success); }

    .topic-card { background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .topic-hd { display: flex; align-items: center; justify-content: space-between; padding: 13px 15px; cursor: pointer; user-select: none; transition: background .12s; }
    .topic-hd:hover { background: rgba(255,255,255,0.04); }
    .topic-name { font-size: 13px; font-weight: 700; color: var(--text); }
    .topic-chev { font-size: 11px; color: var(--muted); transition: transform .2s; }
    .topic-chev.open { transform: rotate(180deg); }
    .topic-body { display: none; padding: 13px 15px; border-top: 1px solid var(--border); }
    .topic-body.open { display: block; }
    .topic-summary { font-size: 13px; line-height: 1.7; color: var(--text2); margin-bottom: 9px; }
    .topic-pts { list-style: none; }
    .topic-pts li {
      font-size: 12px; color: var(--text2); padding: 4px 0 4px 16px;
      position: relative; border-bottom: 1px solid var(--border); line-height: 1.5;
    }
    .topic-pts li:last-child { border-bottom: none; }
    .topic-pts li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }

    .lec-card { background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
    .lec-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .lec-role { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .lec-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; color: var(--text2); }

    .tip-callout { background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2); border-radius: var(--radius); padding: 18px; }
    .tip-label { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
    .tip-text { font-size: 14px; line-height: 1.75; color: var(--text2); }

    .empty-pane { text-align: center; padding: 36px 16px; color: var(--muted); font-size: 13px; }

    .chat-wrap { border-top: 1px solid var(--border); }
    .chat-style-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      background: var(--card2); flex-wrap: wrap;
    }
    .style-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; white-space: nowrap; }
    .style-pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .style-pill {
      padding: 4px 11px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--card); color: var(--muted); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .style-pill:hover { border-color: var(--accent); color: var(--accent); }
    .style-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .chat-messages {
      height: 340px; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { max-width: 78%; display: flex; flex-direction: column; gap: 3px; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.ai { align-self: flex-start; align-items: flex-start; }
    .msg-bubble {
      padding: 10px 14px; border-radius: 14px; font-size: 13px;
      line-height: 1.65; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .msg-bubble { background: var(--accent); color: #fff; border-radius: 14px 14px 4px 14px; }
    .msg.ai .msg-bubble { background: var(--card2); border: 1px solid var(--border); border-radius: 14px 14px 14px 4px; color: var(--text); }
    .msg-time { font-size: 10px; color: var(--muted); }

    .chat-input-row {
      border-top: 1px solid var(--border); padding: 11px 13px;
      display: flex; gap: 8px; align-items: flex-end; background: var(--card);
    }
    .chat-input {
      flex: 1; background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); padding: 9px 12px;
      font-size: 13px; font-family: 'Inter', sans-serif; resize: none;
      outline: none; max-height: 100px; min-height: 38px; transition: border-color .15s;
    }
    .chat-input:focus { border-color: var(--accent); }
    .chat-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 38px; height: 38px; border-radius: var(--radius);
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; color: #fff; transition: background .15s;
    }
    .send-btn:hover { background: #2563EB; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .save-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 500; align-items: center; justify-content: center;
    }
    .save-backdrop.open { display: flex; }
    .save-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; width: 340px; max-width: 92vw;
    }
    .save-box h3 { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; margin-bottom: 13px; color: var(--text); }
    .save-box input {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); padding: 9px 12px;
      font-size: 14px; font-family: 'Inter', sans-serif; outline: none; margin-bottom: 13px;
      transition: border-color .15s;
    }
    .save-box input:focus { border-color: var(--accent); }
    .save-box-footer { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>
<script src="/shared.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error('redirect');
  renderNav('Study Hub');

  const esc = escHtmlClient;
  let attachedFiles = [];
  let studyContext = null;
  let chatHistory = [];
  let activeStyle = 'simple';

  const FILE_ICONS = {
    pdf: '📄', doc: '📝', docx: '📝', xls: '📊', xlsx: '📊',
    txt: '📃', jpg: '🖼', jpeg: '🖼', png: '🖼'
  };

  function getIcon(name) {
    const ext = (name.split('.').pop() || '').toLowerCase();
    return FILE_ICONS[ext] || '📎';
  }

  function nowTime() {
    return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  const main = document.querySelector('.main');
  main.insertAdjacentHTML('afterbegin', `
    <div class="page-header">
      <h1>Study Hub</h1>
      <p>Upload academic material and get AI-powered insights</p>
    </div>
    <div class="page-content">
      <div class="study-layout">

        <div class="panel-card">
          <div class="panel-head">
            <div class="panel-title">Upload Material</div>
            <div class="panel-sub">Files or pasted text — up to 20 files</div>
          </div>
          <div class="panel-body">
            <div class="drop-zone" id="dropZone">
              <div class="drop-icon">📚</div>
              <div class="drop-title">Drop files here or click to browse</div>
              <div class="drop-sub">.pdf .docx .doc .txt .xlsx .jpg .jpeg .png</div>
              <button class="btn-primary" onclick="document.getElementById('fileInput').click()">Browse Files</button>
              <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt,.xlsx,.jpg,.jpeg,.png" multiple style="display:none">
            </div>
            <div class="chips-wrap" id="chipsWrap"></div>
            <div class="divider-or">or paste text</div>
            <textarea class="paste-area" id="pasteArea" placeholder="Paste WhatsApp chat export, class notes, timetable…" rows="5"></textarea>
            <div class="analyse-bar">
              <button class="btn-primary" onclick="runAnalyse()">🔍 Analyse</button>
              <button class="btn-secondary" onclick="clearAll()">Clear</button>
              <span class="char-count" id="charCount">0 chars</span>
            </div>
          </div>
        </div>

        <div>
          <div class="loading-panel" id="loadingPanel">
            <div class="spinner" style="margin:0 auto"></div>
            <div class="loading-title">Analysing your material…</div>
            <div class="loading-sub">Extracting assignments, topics, and schedule</div>
          </div>

          <div class="result-panel" id="resultPanel">
            <div class="result-topbar">
              <div class="result-topbar-title">Analysis Results</div>
              <button class="btn-secondary btn-sm" onclick="resetResult()">← New Analysis</button>
              <button class="btn-primary btn-sm" onclick="openSaveModal()">Save to Notes</button>
            </div>
            <div class="overview-box" id="overviewBox"></div>
            <div class="tabs-bar">
              <button class="tab-btn active" data-tab="assignments" onclick="switchTab('assignments')">Assignments</button>
              <button class="tab-btn" data-tab="timetable" onclick="switchTab('timetable')">Timetable</button>
              <button class="tab-btn" data-tab="topics" onclick="switchTab('topics')">Topics</button>
              <button class="tab-btn" data-tab="lecturers" onclick="switchTab('lecturers')">Lecturers</button>
              <button class="tab-btn" data-tab="tip" onclick="switchTab('tip')">Tip</button>
            </div>
            <div class="tab-pane active" id="tab-assignments"></div>
            <div class="tab-pane" id="tab-timetable"></div>
            <div class="tab-pane" id="tab-topics"></div>
            <div class="tab-pane" id="tab-lecturers"></div>
            <div class="tab-pane" id="tab-tip"></div>
            <div class="chat-wrap">
              <div class="chat-style-bar">
                <span class="style-label">Style:</span>
                <div class="style-pills">
                  <button class="style-pill active" data-style="simple" onclick="setStyle(this)">Simple</button>
                  <button class="style-pill" data-style="academic" onclick="setStyle(this)">Academic</button>
                  <button class="style-pill" data-style="exam" onclick="setStyle(this)">Exam Mode</button>
                  <button class="style-pill" data-style="naija" onclick="setStyle(this)">Naija Mode</button>
                  <button class="style-pill" data-style="eli5" onclick="setStyle(this)">ELI5</button>
                  <button class="style-pill" data-style="tutor" onclick="setStyle(this)">Tutor</button>
                </div>
              </div>
              <div class="chat-messages" id="chatMessages">
                <div class="msg ai">
                  <div class="msg-bubble">Hey! I've analysed your material. Ask me anything — assignments, topics, deadlines, or anything else.</div>
                  <div class="msg-time" id="initMsgTime"></div>
                </div>
              </div>
              <div class="chat-input-row">
                <textarea class="chat-input" id="chatInput" placeholder="Ask about your material…" rows="1" onkeydown="handleChatKey(event)" oninput="autoGrow(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendChat()">➤</button>
              </div>
            </div>
          </div>

          <div id="emptyRight" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:60px 20px;text-align:center;color:var(--muted)">
            <div style="font-size:38px;margin-bottom:12px">📖</div>
            <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:7px">No analysis yet</div>
            <div style="font-size:13px">Upload files or paste text on the left, then click Analyse</div>
          </div>
        </div>

      </div>
    </div>

    <div class="save-backdrop" id="saveBackdrop">
      <div class="save-box">
        <h3>Save to Notes</h3>
        <input type="text" id="saveNameInput" placeholder="Name for this analysis…" maxlength="100">
        <div class="save-box-footer">
          <button class="btn-secondary btn-sm" onclick="closeSaveModal()">Cancel</button>
          <button class="btn-primary btn-sm" onclick="saveAnalysis()">Save</button>
        </div>
      </div>
    </div>
  `);

  document.getElementById('initMsgTime').textContent = nowTime();

  (function restoreFromNotes() {
    const stored = sessionStorage.getItem('cm_study_result');
    if (!stored) return;
    sessionStorage.removeItem('cm_study_result');
    try { studyContext = JSON.parse(stored); renderResults(studyContext); } catch {}
  })();

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const pasteArea = document.getElementById('pasteArea');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files.length) addFiles(fileInput.files); fileInput.value = ''; });
  pasteArea.addEventListener('input', updateCount);

  function addFiles(files) {
    Array.from(files).forEach(f => {
      if (attachedFiles.length < 20 && !attachedFiles.find(x => x.name === f.name && x.size === f.size)) {
        attachedFiles.push(f);
      }
    });
    renderChips();
    updateCount();
  }

  function removeFile(idx) { attachedFiles.splice(idx, 1); renderChips(); updateCount(); }

  function renderChips() {
    const wrap = document.getElementById('chipsWrap');
    if (!attachedFiles.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'flex';
    wrap.innerHTML = attachedFiles.map((f, i) => `
      <div class="chip">
        <span>${getIcon(f.name)}</span>
        <span class="chip-name" title="${esc(f.name)}">${esc(f.name)}</span>
        <button class="chip-rm" onclick="removeFile(${i})">×</button>
      </div>`).join('');
  }

  function updateCount() {
    const chars = pasteArea.value.length;
    const files = attachedFiles.length;
    let label = chars ? chars.toLocaleString() + ' chars' : '';
    if (files) label += (label ? ' + ' : '') + files + ' file' + (files !== 1 ? 's' : '');
    document.getElementById('charCount').textContent = label || '0 chars';
  }

  function clearAll() {
    pasteArea.value = '';
    attachedFiles = [];
    renderChips();
    updateCount();
  }

  function resetResult() {
    document.getElementById('resultPanel').style.display = 'none';
    document.getElementById('emptyRight').style.display = 'block';
    studyContext = null;
    chatHistory = [];
  }

  async function runAnalyse() {
    const text = pasteArea.value.trim();
    if (!text && !attachedFiles.length) { showToast('Paste text or upload files first', 'error'); return; }
    document.getElementById('loadingPanel').style.display = 'block';
    document.getElementById('resultPanel').style.display = 'none';
    document.getElementById('emptyRight').style.display = 'none';
    try {
      let res;
      if (attachedFiles.length) {
        const fd = new FormData();
        attachedFiles.forEach(f => fd.append('files[]', f));
        if (text) fd.append('text', text);
        res = await Auth.fetchWithAuth('/api/analyze-files', { method: 'POST', body: fd });
      } else {
        res = await Auth.fetchWithAuth('/api/analyze', { method: 'POST', body: JSON.stringify({ content: text }) });
      }
      if (!res) return;
      if (!res.ok) {
        let msg = 'Analysis failed';
        try { const e = await res.json(); msg = e.error || msg; } catch {}
        throw new Error(msg);
      }
      studyContext = await res.json();
      renderResults(studyContext);
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
      document.getElementById('emptyRight').style.display = 'block';
    } finally {
      document.getElementById('loadingPanel').style.display = 'none';
    }
  }

  function renderResults(data) {
    document.getElementById('emptyRight').style.display = 'none';
    document.getElementById('resultPanel').style.display = 'block';
    document.getElementById('overviewBox').textContent = data.overview || '';
    renderAssignments(data.assignments || []);
    renderTimetable(data.timetable || []);
    renderTopics(data.topics || {});
    renderLecturers(data.lecturers || []);
    renderTip(data.tip || '');
    switchTab('assignments');
    resetChat();
  }

  function renderAssignments(list) {
    const el = document.getElementById('tab-assignments');
    if (!list.length) { el.innerHTML = '<div class="empty-pane">No assignments found.</div>'; return; }
    const sorted = [...list].sort((a, b) => ({ HIGH: 0, MEDIUM: 1, LOW: 2 }[a.priority] ?? 1) - ({ HIGH: 0, MEDIUM: 1, LOW: 2 }[b.priority] ?? 1));
    el.innerHTML = sorted.map(a => `
      <div class="assign-card ${a.priority || 'LOW'}">
        <div class="assign-head">
          <div class="assign-title">${esc(a.title)}</div>
          <span class="prio-badge prio-${a.priority || 'LOW'}">${a.priority || 'LOW'}</span>
        </div>
        <div class="assign-meta">
          <span>📖 ${esc(a.subject || '')}</span>
          <span>📅 ${esc(a.deadline || '')}</span>
          ${a.marks ? '<span>🏆 ' + esc(String(a.marks)) + ' marks</span>' : ''}
        </div>
        <div class="assign-details">${esc(a.details || '')}</div>
      </div>`).join('');
  }

  function renderTimetable(list) {
    const el = document.getElementById('tab-timetable');
    if (!list.length) { el.innerHTML = '<div class="empty-pane">No timetable found.</div>'; return; }
    el.innerHTML = '<div style="overflow-x:auto"><table class="tt-table"><thead><tr>'
      + '<th>Day</th><th>Time</th><th>Subject</th><th>Type</th><th>Venue</th>'
      + '</tr></thead><tbody>'
      + list.map(s => `<tr>
          <td style="font-weight:600;color:var(--text)">${esc(s.day || '')}</td>
          <td style="color:var(--muted)">${esc(s.time || '')}</td>
          <td>${esc(s.subject || '')}</td>
          <td><span class="tt-type type-${(s.type || 'class').toLowerCase()}">${esc((s.type || 'class').replace('_', ' '))}</span></td>
          <td style="color:var(--muted)">${esc(s.venue || '')}</td>
        </tr>`).join('')
      + '</tbody></table></div>';
  }

  function renderTopics(topics) {
    const el = document.getElementById('tab-topics');
    const keys = Object.keys(topics);
    if (!keys.length) { el.innerHTML = '<div class="empty-pane">No topics found.</div>'; return; }
    el.innerHTML = keys.map((subj, i) => {
      const t = topics[subj];
      const id = 'tp-' + i;
      const pts = (t.key_points || []).map(p => '<li>' + esc(p) + '</li>').join('');
      const subs = (t.subtopics || []).map(s => '<li>' + esc(s) + '</li>').join('');
      return `<div class="topic-card">
        <div class="topic-hd" onclick="toggleTopic('${id}')">
          <div class="topic-name">${esc(subj)}</div>
          <span class="topic-chev${i === 0 ? ' open' : ''}" id="chev-${id}">▾</span>
        </div>
        <div class="topic-body${i === 0 ? ' open' : ''}" id="${id}">
          ${t.summary ? '<div class="topic-summary">' + esc(t.summary) + '</div>' : ''}
          ${pts ? '<ul class="topic-pts">' + pts + '</ul>' : ''}
          ${subs ? '<div style="margin-top:8px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Subtopics</div><ul class="topic-pts">' + subs + '</ul>' : ''}
        </div>
      </div>`;
    }).join('');
  }

  function toggleTopic(id) {
    document.getElementById(id)?.classList.toggle('open');
    document.getElementById('chev-' + id)?.classList.toggle('open');
  }

  function renderLecturers(list) {
    const el = document.getElementById('tab-lecturers');
    if (!list.length) { el.innerHTML = '<div class="empty-pane">No lecturer info found.</div>'; return; }
    el.innerHTML = list.map(l => `
      <div class="lec-card">
        <div class="lec-name">${esc(l.name || '')}</div>
        ${l.title ? '<div class="lec-role">' + esc(l.title) + '</div>' : ''}
        <div class="lec-meta">
          ${l.course ? '<span>📖 ' + esc(l.course) + '</span>' : ''}
          ${l.email ? '<span>✉ ' + esc(l.email) + '</span>' : ''}
          ${l.phone ? '<span>📞 ' + esc(l.phone) + '</span>' : ''}
          ${l.office ? '<span>🏢 ' + esc(l.office) + '</span>' : ''}
        </div>
      </div>`).join('');
  }

  function renderTip(tip) {
    const el = document.getElementById('tab-tip');
    if (!tip) { el.innerHTML = '<div class="empty-pane">No tip available.</div>'; return; }
    el.innerHTML = `<div class="tip-callout"><div class="tip-label">💡 AI Study Tip</div><div class="tip-text">${esc(tip)}</div></div>`;
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
  }

  function setStyle(btn) {
    document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    activeStyle = btn.dataset.style;
  }

  function resetChat() {
    chatHistory = [];
    document.getElementById('chatMessages').innerHTML = `
      <div class="msg ai">
        <div class="msg-bubble">Hey! I've analysed your material. Ask me anything — assignments, topics, deadlines, or anything else.</div>
        <div class="msg-time">${nowTime()}</div>
      </div>`;
  }

  function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleChatKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  }

  function appendMsg(role, text) {
    const box = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = '<div class="msg-bubble">' + esc(text) + '</div><div class="msg-time">' + nowTime() + '</div>';
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  function appendTyping() {
    const box = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = '<div class="msg-bubble"><div class="spinner spinner-sm" style="display:inline-block;vertical-align:middle"></div></div>';
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  async function sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !studyContext) return;
    input.value = '';
    autoGrow(input);
    document.getElementById('sendBtn').disabled = true;
    appendMsg('user', text);
    chatHistory.push({ role: 'user', content: text });
    const typingEl = appendTyping();
    try {
      const res = await Auth.fetchWithAuth('/api/chat', {
        method: 'POST',
        body: JSON.stringify({ message: text, style: activeStyle, context: studyContext, history: chatHistory.slice(-10) })
      });
      if (!res) return;
      typingEl.remove();
      const box = document.getElementById('chatMessages');
      const aiDiv = document.createElement('div');
      aiDiv.className = 'msg ai';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      aiDiv.appendChild(bubble);
      const ts = document.createElement('div');
      ts.className = 'msg-time';
      ts.textContent = nowTime();
      aiDiv.appendChild(ts);
      box.appendChild(aiDiv);

      if (res.body && res.headers.get('content-type')?.includes('text/event-stream')) {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          decoder.decode(value, { stream: true }).split('\n').forEach(line => {
            if (line.startsWith('data: ')) {
              const d = line.slice(6).trim();
              if (d && d !== '[DONE]') {
                try {
                  const p = JSON.parse(d);
                  const tok = p.delta?.text || p.choices?.[0]?.delta?.content || p.text || '';
                  full += tok;
                  bubble.textContent = full;
                } catch { full += d; bubble.textContent = full; }
              }
            }
          });
          box.scrollTop = box.scrollHeight;
        }
        chatHistory.push({ role: 'assistant', content: full });
      } else {
        const data = await res.json();
        const reply = data.reply || data.message || '';
        bubble.textContent = reply;
        chatHistory.push({ role: 'assistant', content: reply });
        box.scrollTop = box.scrollHeight;
      }
    } catch (err) {
      typingEl?.remove();
      showToast('Chat error: ' + err.message, 'error');
    } finally {
      document.getElementById('sendBtn').disabled = false;
    }
  }

  function openSaveModal() {
    if (!studyContext) return;
    document.getElementById('saveNameInput').value = '';
    document.getElementById('saveBackdrop').classList.add('open');
    setTimeout(() => document.getElementById('saveNameInput').focus(), 50);
  }

  function closeSaveModal() {
    document.getElementById('saveBackdrop').classList.remove('open');
  }

  document.getElementById('saveBackdrop').addEventListener('click', function(e) {
    if (e.target === this) closeSaveModal();
  });

  async function saveAnalysis() {
    const name = document.getElementById('saveNameInput').value.trim();
    if (!name) { showToast('Please enter a name', 'error'); return; }
    if (!studyContext) return;
    try {
      const res = await Auth.fetchWithAuth('/api/analyses', {
        method: 'POST',
        body: JSON.stringify({ name, result: studyContext })
      });
      if (!res) return;
      if (res.ok) { showToast('Saved to Notes!', 'success'); closeSaveModal(); }
      else { const e = await res.json().catch(() => ({})); showToast(e.error || 'Save failed', 'error'); }
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSaveModal(); });
</script>
</body>
</html>
