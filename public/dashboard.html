<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — ClassMind AI</title>
  <style>
    .hero-banner {
      background: linear-gradient(135deg, #1d4ed8 0%, #3B82F6 60%, #0ea5e9 100%);
      border-radius: var(--radius);
      padding: 32px 36px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .hero-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(255,255,255,0.09) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-greeting {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      position: relative;
    }
    .hero-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.82);
      position: relative;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    @media (max-width: 700px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 3px;
    }
    .stat-sub { font-size: 12px; color: var(--muted); }
    .skel {
      background: linear-gradient(90deg, var(--card2) 25%, var(--border) 50%, var(--card2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 36px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .section-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }
    .section-link { font-size: 12px; font-weight: 600; color: var(--accent); text-decoration: none; }
    .section-link:hover { text-decoration: underline; }
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 24px;
    }
    @media (max-width: 680px) { .content-grid { grid-template-columns: 1fr; } }
    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .section-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px 0;
      margin-bottom: 8px;
    }
    .section-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .task-list { padding: 0 18px 10px; }
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .task-item:last-child { border-bottom: none; }
    .task-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .dot-high { background: var(--danger); }
    .dot-medium { background: var(--warn); }
    .dot-low { background: var(--success); }
    .task-info { flex: 1; min-width: 0; }
    .task-subject {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 2px;
    }
    .task-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-status {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tbadge {
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .tbadge-high { background: rgba(239,68,68,.15); color: var(--danger); }
    .tbadge-medium { background: rgba(245,158,11,.15); color: var(--warn); }
    .tbadge-low { background: rgba(34,197,94,.15); color: var(--success); }
    .note-list { padding: 0 18px 10px; }
    .note-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .note-item:last-child { border-bottom: none; }
    .note-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .note-date { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .note-snippet {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .quick-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    @media (max-width: 600px) { .quick-links { grid-template-columns: repeat(2, 1fr); } }
    .quick-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text2);
      font-size: 13px;
      font-weight: 600;
      transition: border-color .15s, background .15s;
    }
    .quick-link:hover {
      border-color: var(--accent);
      background: var(--card2);
      color: var(--text);
      text-decoration: none;
    }
    .quick-link-icon { font-size: 22px; }
    .empty-item {
      text-align: center;
      padding: 28px 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .refresh-btn:hover { background: var(--border); color: var(--text); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
<script src="/shared.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error('redirect');
  renderNav('Dashboard');

  const esc = escHtmlClient;

  function timeOfDay() {
    const h = new Date().getHours();
    return h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  }

  function timeAgo(str) {
    if (!str) return '';
    const d = new Date(str);
    if (isNaN(d)) return str;
    const diff = Date.now() - d;
    const m = Math.floor(diff / 60000);
    const h = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    if (m < 1) return 'Just now';
    if (m < 60) return m + 'm ago';
    if (h < 24) return h + 'h ago';
    if (days < 7) return days + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function priorityKey(p) {
    const s = (p || '').toLowerCase();
    if (s === 'high') return 'high';
    if (s === 'low') return 'low';
    return 'medium';
  }

  function renderHero(user) {
    const period = timeOfDay();
    const name = (user && user.name) ? user.name : 'Student';
    const level = (user && user.level) ? user.level : '';
    const uni = (user && user.university) ? user.university : '';
    const sub = level && uni ? level + ' student at ' + uni : (uni || level || 'Welcome back');
    document.getElementById('hero-greeting').textContent = 'Good ' + period + ', ' + name + '!';
    document.getElementById('hero-sub').textContent = sub;
  }

  function setStatVal(id, val, sub) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '<div class="stat-value">' + esc(String(val)) + '</div>'
      + (sub ? '<div class="stat-sub">' + esc(sub) + '</div>' : '');
  }

  function renderRecentTasks(tasks) {
    const el = document.getElementById('recent-tasks');
    if (!tasks || !tasks.length) {
      el.innerHTML = '<div class="empty-item">No tasks yet. <a href="/tasks.html" style="color:var(--accent)">Add one</a></div>';
      return;
    }
    const sorted = tasks.slice().sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)).slice(0, 5);
    el.innerHTML = sorted.map(t => {
      const pk = priorityKey(t.priority);
      return '<div class="task-item">'
        + '<div class="task-dot dot-' + pk + '"></div>'
        + '<div class="task-info">'
        + '<div class="task-subject">' + esc(t.subject || '') + '</div>'
        + '<div class="task-title">' + esc(t.title || 'Untitled') + '</div>'
        + '</div>'
        + '<span class="tbadge tbadge-' + pk + '">' + esc((t.priority || 'medium').toUpperCase()) + '</span>'
        + '</div>';
    }).join('');
  }

  function renderRecentNotes(analyses) {
    const el = document.getElementById('recent-notes');
    if (!analyses || !analyses.length) {
      el.innerHTML = '<div class="empty-item">No notes yet. <a href="/study.html" style="color:var(--accent)">Analyse material</a></div>';
      return;
    }
    const sorted = analyses.slice().sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)).slice(0, 5);
    el.innerHTML = sorted.map(a => {
      const snippet = (a.overview || '').slice(0, 100);
      return '<div class="note-item">'
        + '<div class="note-name">' + esc(a.name || 'Untitled') + '</div>'
        + '<div class="note-date">' + esc(timeAgo(a.created_at)) + '</div>'
        + (snippet ? '<div class="note-snippet">' + esc(snippet) + (a.overview && a.overview.length > 100 ? '…' : '') + '</div>' : '')
        + '</div>';
    }).join('');
  }

  async function refreshUpdates(btn) {
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner spinner-sm" style="display:inline-block;vertical-align:middle"></div> Refreshing…';
    try {
      const res = await Auth.fetchWithAuth('/api/updates/refresh', { method: 'POST' });
      if (!res) return;
      if (res.ok) {
        const data = await res.json();
        showToast('Updates refreshed — ' + (data.inserted || 0) + ' new items', 'success');
        loadDashboard();
      } else {
        showToast('Failed to refresh updates', 'error');
      }
    } catch (e) {
      showToast('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '↻ Refresh Updates';
    }
  }

  async function loadDashboard() {
    const cachedUser = Auth.getUser() || {};
    renderHero(cachedUser);

    const [tasksRes, analysesRes, updatesRes] = await Promise.allSettled([
      Auth.fetchWithAuth('/api/tasks'),
      Auth.fetchWithAuth('/api/analyses'),
      Auth.fetchWithAuth('/api/updates'),
    ]);

    let tasks = [], analyses = [], updates = [];

    if (tasksRes.status === 'fulfilled' && tasksRes.value && tasksRes.value.ok) {
      tasks = await tasksRes.value.json();
      if (!Array.isArray(tasks)) tasks = [];
    }
    if (analysesRes.status === 'fulfilled' && analysesRes.value && analysesRes.value.ok) {
      analyses = await analysesRes.value.json();
      if (!Array.isArray(analyses)) analyses = [];
    }
    if (updatesRes.status === 'fulfilled' && updatesRes.value && updatesRes.value.ok) {
      updates = await updatesRes.value.json();
      if (!Array.isArray(updates)) updates = [];
    }

    const liveUser = Auth.getUser() || cachedUser;
    renderHero(liveUser);

    const courses = (liveUser.courses && Array.isArray(liveUser.courses)) ? liveUser.courses : [];
    const unread = updates.filter(u => !u.read_flag).length;

    setStatVal('stat-tasks', tasks.length, 'total tasks');
    setStatVal('stat-notes', analyses.length, 'saved notes');
    setStatVal('stat-courses', courses.length, 'enrolled');
    setStatVal('stat-updates', unread, 'unread updates');

    renderRecentTasks(tasks);
    renderRecentNotes(analyses);
  }

  document.querySelector('.main').insertAdjacentHTML('afterbegin', `
    <div class="page-header">
      <h1>Dashboard</h1>
      <p>Your academic overview</p>
    </div>
    <div class="page-content">

      <div class="hero-banner">
        <div class="hero-greeting" id="hero-greeting">Good morning, Student!</div>
        <div class="hero-sub" id="hero-sub">Welcome back</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Tasks</div>
          <div id="stat-tasks"><div class="skel"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Notes</div>
          <div id="stat-notes"><div class="skel"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Courses</div>
          <div id="stat-courses"><div class="skel"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Updates Unread</div>
          <div id="stat-updates"><div class="skel"></div></div>
        </div>
      </div>

      <div class="section-row" style="margin-bottom:12px">
        <span class="section-title">Quick Links</span>
        <button class="refresh-btn" onclick="refreshUpdates(this)">↻ Refresh Updates</button>
      </div>
      <div class="quick-links">
        <a href="/study.html" class="quick-link"><span class="quick-link-icon">📖</span>Study Hub</a>
        <a href="/notes.html" class="quick-link"><span class="quick-link-icon">📝</span>Notes</a>
        <a href="/tasks.html" class="quick-link"><span class="quick-link-icon">✓</span>Tasks</a>
        <a href="/projects.html" class="quick-link"><span class="quick-link-icon">🏗</span>Projects</a>
      </div>

      <div class="content-grid">
        <div class="section-card">
          <div class="section-card-head">
            <div class="section-card-title">Recent Tasks</div>
            <a href="/tasks.html" class="section-link">View all →</a>
          </div>
          <div class="task-list" id="recent-tasks">
            <div class="empty-item"><div class="spinner spinner-sm" style="margin:0 auto"></div></div>
          </div>
        </div>
        <div class="section-card">
          <div class="section-card-head">
            <div class="section-card-title">Recent Notes</div>
            <a href="/notes.html" class="section-link">View all →</a>
          </div>
          <div class="note-list" id="recent-notes">
            <div class="empty-item"><div class="spinner spinner-sm" style="margin:0 auto"></div></div>
          </div>
        </div>
      </div>

    </div>
  `);

  loadDashboard().catch(e => showToast('Failed to load dashboard: ' + e.message, 'error'));
</script>
</body>
</html>
